{id:"bert",lv:9,cat:"modern",name:"BERT / FinBERT",desc:"Encoder, bidirectional, MLM, fine-tuning, domain adaptation, variants",
w:"Bidirectional Encoder Representations from Transformers. Encoder-only, bidirectional — sees full context both directions. Pre-training task 1 — Masked Language Modeling (MLM): randomly mask 15% of tokens, predict from context. Of the 15%: 80% replaced with [MASK], 10% with random word, 10% unchanged (prevents model from only learning [MASK] patterns). 'The [MASK] sat on the mat' → predict 'cat.' Forces bidirectional understanding. Pre-training task 2 — Next Sentence Prediction (NSP): given two sentences, predict if B follows A. Teaches sentence relationships. (RoBERTa later showed NSP isn't very important.) Sizes: BERT-base (110M params, 12 layers, 768 hidden), BERT-large (340M, 24 layers, 1024). Fine-tuning: BERT alone doesn't do specific tasks. Add a task-specific head and train on your data. Classification: [CLS] embedding → linear → softmax. NER: each token embedding → linear → label. QA: predict start and end positions. Feature extraction (alternative): freeze BERT, use embeddings as fixed features. Less accurate but faster. FinBERT: BERT further pre-trained on financial text (news, earnings calls, SEC filings), then fine-tuned for financial sentiment. WHY: 'material adverse effect,' 'goodwill impairment' have domain-specific meanings general BERT might miss. Variants: RoBERTa (better recipe: more data, longer training, no NSP, dynamic masking → outperforms BERT), DistilBERT (60% size, 97% performance via knowledge distillation).",
why:"YOUR INFERA PROJECT. FinBERT embeds 10-K sections for risk analysis. Understanding BERT = understanding your own system.",
hot:"Know MLM (80/10/10 split), [CLS] for classification, fine-tuning process. Say: 'I used FinBERT because financial language has domain-specific semantics that general BERT misses.'",
guide:"Guide 4.6 — BERT, complete",prereqs:["transformer","embeddings"],
videos:[{t:"BERT explained",c:"StatQuest",u:"https://www.youtube.com/results?search_query=statquest+bert"},{t:"Illustrated BERT",c:"Jay Alammar",u:"https://www.youtube.com/results?search_query=jay+alammar+illustrated+bert"}],
code:"from transformers import pipeline\n\nfill = pipeline('fill-mask', model='bert-base-uncased')\nfor r in fill('The [MASK] sat on the mat.')[:3]:\n    print(f\"  {r['token_str']}: {r['score']:.3f}\")\n\n# FinBERT sentiment\nfrom transformers import AutoTokenizer, AutoModelForSequenceClassification\nimport torch\ntok = AutoTokenizer.from_pretrained('ProsusAI/finbert')\nmodel = AutoModelForSequenceClassification.from_pretrained('ProsusAI/finbert')\ninputs = tok('Material adverse effect on revenue', return_tensors='pt')\nwith torch.no_grad():\n    pred = torch.softmax(model(**inputs).logits, dim=1)\nprint('Pos/Neg/Neutral:', pred.round(decimals=3))",
draw:"Draw BERT: [CLS] The cat [MASK] on mat [SEP] → bidirectional Transformer encoder (arrows between ALL tokens) → [CLS] output for classification, [MASK] output predicts missing word. Show fine-tuning: add task head on top.",
quiz:{q:"How does BERT's pre-training work and why is it called 'bidirectional'?",a:"BERT is pre-trained with Masked Language Modeling: randomly mask 15% of tokens (80% [MASK], 10% random, 10% unchanged) and predict them from context. Unlike GPT which only sees previous words (left-to-right), BERT sees the FULL context — words before AND after the mask. This bidirectional understanding is why BERT excels at classification, NER, and QA. Fine-tuning adds a task-specific head (e.g., linear+softmax for classification using [CLS] token) and trains on your labeled data."},
followups:[{q:"Why FinBERT over regular BERT for Infera?",a:"Financial language has domain-specific semantics. 'Material adverse effect' and 'goodwill impairment' carry specific risk implications in SEC filings that general BERT — trained on Wikipedia and books — might not weight correctly. FinBERT was further pre-trained on millions of financial documents, so its embedding space better represents financial nuances. My Precision@10 of 0.80 validated this — general BERT would likely have lower precision for financial document retrieval."}],
actions:["Run BERT fill-mask on 5 sentences","Run FinBERT on 3 SEC filing sentences","Fine-tune BERT on a classification task with HuggingFace Trainer"]},

{id:"gpt",lv:9,cat:"modern",name:"GPT & LLM training",desc:"Decoder, autoregressive, pre-train → SFT → RLHF/DPO, hallucination, emergent abilities",
w:"Generative Pre-trained Transformer. Decoder-only, autoregressive — reads left-to-right, predicts next token. Causal masking: can only attend to previous positions. Training pipeline — Phase 1 Pre-training: next token prediction on trillions of tokens (books, Wikipedia, web, code). Billions of parameters, thousands of GPUs, months, millions of dollars. Learns grammar, facts, reasoning, code, languages. Scaling laws: bigger model + data + compute = predictably better. Phase 2 SFT: fine-tune on curated conversations (10K-100K examples). Learns to follow instructions, be helpful. Phase 3 RLHF: humans compare two responses, pick better one. Train reward model on preferences. Use RL (PPO) to optimize LLM for reward model score. KL-divergence penalty prevents straying too far from SFT model. DPO: simpler alternative, directly optimizes on preferences without separate reward model. Emergent abilities: capabilities appearing suddenly at scale (chain-of-thought, in-context learning). In-context learning: learn from prompt examples without weight updates. Hallucination: generates plausible but false text — trained to predict likely text, not verify truth. Grounding via RAG connects to real knowledge sources.",
why:"Powers ChatGPT, Claude, every chat AI. Understanding the 3-phase pipeline shows deep knowledge that separates you from candidates who just 'use' LLMs.",
hot:"Know all 3 phases. Know BERT vs GPT (encoder/bidirectional vs decoder/autoregressive). Know temperature/top-k/top-p. Know hallucination and grounding. Know DPO as simpler RLHF alternative.",
guide:"Guide 4.7 (GPT), 4.10 (LLM Training)",prereqs:["transformer","embeddings"],
videos:[{t:"How ChatGPT works",c:"ByteByteGo",u:"https://www.youtube.com/results?search_query=how+chatgpt+works+technically"},{t:"RLHF explained",c:"StatQuest",u:"https://www.youtube.com/results?search_query=statquest+rlhf"}],
code:"from transformers import pipeline\n\ngen = pipeline('text-generation', model='gpt2')\nfor temp in [0.3, 0.7, 1.2]:\n    out = gen('Machine learning is', max_length=30, temperature=temp, do_sample=True)\n    print(f'Temp {temp}: {out[0][\"generated_text\"][:80]}...')",
draw:"Draw 3-phase pipeline: massive internet text → pre-training → SFT on curated conversations → RLHF with human preferences. Draw BERT vs GPT: encoder (bidirectional arrows) vs decoder (left-to-right arrows with causal mask).",
quiz:{q:"Explain the three phases of LLM training.",a:"Phase 1 — Pre-training: next token prediction on trillions of tokens. Learns language, facts, reasoning. Phase 2 — SFT: fine-tune on curated examples of ideal assistant conversations. Learns to follow instructions, be helpful, format responses. Phase 3 — RLHF: humans compare response pairs, pick better one. Train reward model on preferences. Use PPO to optimize LLM for reward model scores. KL penalty prevents reward hacking. DPO is a simpler alternative that directly optimizes on preference pairs without a separate reward model."},
followups:[{q:"What causes hallucination?",a:"LLMs are trained to predict LIKELY text based on patterns, not to verify facts. 'What sounds plausible based on training data?' ≠ 'what's actually true.' The model has no internal fact-checker. Grounding (RAG, tool use) connects it to real knowledge sources to reduce hallucination."}],
actions:["Generate with GPT-2 at 4 temperatures — compare coherence","Explain the 3-phase pipeline out loud in under 2 minutes","Give GPT few-shot examples and observe in-context learning"]},

{id:"rag",lv:9,cat:"modern",name:"RAG",desc:"Retrieval-Augmented Generation, chunking, vector search, reranking",
w:"The problem: LLMs hallucinate and don't know about your specific documents. The solution: FIND relevant documents and give them to the LLM as context before it answers. Architecture — Offline: split documents into chunks (200-500 tokens with 50-100 overlap) → embed each chunk with a model (FinBERT, sentence-transformers) → store embeddings in vector database (pgvector, Pinecone, FAISS). Online: user asks question → embed query with SAME model → search vector DB for most similar chunks via cosine similarity → feed top-k chunks to LLM as context → LLM generates answer grounded in retrieved documents. Chunking tradeoff: too small (50 tokens) = fragments lose context. Too large (2000 tokens) = dilutes with irrelevant info. 200-500 tokens with overlap is the sweet spot. KEY INSIGHT: retrieval quality matters MORE than generation quality. If you retrieve wrong documents, best LLM can't help. Invest in embedding model, chunking strategy, and reranking. Reranking: after fast initial retrieval (ANN), apply a more expensive cross-encoder model to rerank top-k results by relevance — significantly improves precision. YOUR INFERA PROJECT IS THIS: chunk 10-K filings → FinBERT embeddings → pgvector → cosine similarity → LangGraph orchestration.",
why:"YOUR INFERA PROJECT. Reduces hallucination. Enables domain-specific Q&A. Updatable without retraining. Everywhere in production 2026.",
hot:"Walk through Infera as RAG end-to-end. Say 'retrieval quality matters more than generation quality.' Know chunking tradeoff. Know reranking improves precision.",
guide:"Guide 4.12 — RAG",prereqs:["bert","gpt","embeddings"],
videos:[{t:"RAG explained",c:"IBM Technology",u:"https://www.youtube.com/results?search_query=rag+retrieval+augmented+generation+explained"}],
code:"# Infera RAG pipeline (pseudocode)\n# OFFLINE\nchunks = split_10k_into_sections(filing)\nembeddings = finbert.encode(chunks)\npgvector.store(chunks, embeddings)\n\n# ONLINE\nquery_emb = finbert.encode(user_query)\ntop_sections = pgvector.similarity_search(query_emb, top_k=10)\nprompt = f'Context: {top_sections}\\n\\nQuestion: {user_query}'\nanswer = llm.generate(prompt)  # grounded in retrieved docs",
draw:"Draw RAG architecture: Documents → Chunk → Embed → Vector DB. Then: Query → Embed → Search DB → Top-K → LLM with context → Grounded answer. Label each step.",
quiz:{q:"Walk me through your Infera project as a RAG system.",a:"Infera is a RAG pipeline for SEC 10-K risk analysis. Offline: I parse filings into sections, embed each with FinBERT — a BERT model further pre-trained on financial text — and store the embeddings in PostgreSQL via pgvector. Online: when a user asks about risk factors, I embed their query with the same FinBERT model, perform cosine similarity search in pgvector to find the most relevant filing sections, and return them ranked by relevance. The serving layer is FastAPI with a REST API and Python SDK. I integrated LangGraph with OpenAI function calling for agentic multi-step queries over the data."},
followups:[{q:"Why does retrieval quality matter more than generation quality?",a:"If you retrieve the wrong documents, even the best LLM generates answers from irrelevant context — confident but wrong. But if you retrieve the RIGHT documents, even a mediocre LLM can extract the answer because the information is right there. Invest in: better embedding model (domain-specific like FinBERT), better chunking (preserve context), reranking (cross-encoder scores for precision)."}],
actions:["Build a mini RAG: embed 10 paragraphs, store in FAISS, query with cosine similarity","Experiment with chunk sizes 100, 300, 500, 1000 — measure retrieval precision","Add a cross-encoder reranker and compare precision before/after"]},

{id:"finetuning",lv:9,cat:"modern",name:"Fine-tuning, LoRA & generative models",desc:"Full FT, LoRA, QLoRA, distillation, quantization, autoencoders, GANs, when to use what",
w:"Transfer learning: pre-train on massive general data → adapt to specific task. Full fine-tuning: update ALL weights on your data. Most flexible but expensive. Feature extraction: freeze base, train new head only. Fast but less adaptable. LoRA (Low-Rank Adaptation): instead of updating full weight matrices (4096×4096 = 16.7M params), add small adapter matrices A (4096×16) and B (16×4096) = 131K params. W_new = W_frozen + A×B. 99% fewer trainable params! At inference, merge into base → no extra latency. QLoRA: quantize base to 4-bit THEN apply LoRA. Fine-tune 65B model on consumer GPU. Quantization: fp32 → fp16 → int8 → int4. 7B model: 28GB in fp32 → 3.5GB in int4. Knowledge distillation: large teacher teaches small student. Student learns from teacher's soft probabilities (confidence levels), not just hard labels. DistilBERT = 60% of BERT, 97% performance. Autoencoders: compress input → bottleneck → reconstruct. Learns essential features. Uses: dimensionality reduction, denoising, anomaly detection. GANs: generator (creates fakes) vs discriminator (catches fakes). Train adversarially. Challenges: mode collapse, training instability. Largely replaced by diffusion models (DALL-E, Stable Diffusion) for image generation. Decision tree: prompt engineering first (no training) → RAG if needs knowledge (no training) → fine-tune if needs behavioral change (needs training). Often combine: fine-tune + RAG.",
why:"How you customize LLMs affordably. Companies love LoRA candidates. Understanding the prompt→RAG→fine-tune decision tree shows practical engineering judgment.",
hot:"Know LoRA's low-rank trick (A×B adapters). Know the decision framework. Know quantization enables consumer GPUs. Know GANs were replaced by diffusion models.",
guide:"Guide 4.11 (Transfer Learning), 4.13 (Generative Models)",prereqs:["bert","gpt"],
videos:[{t:"LoRA explained",c:"StatQuest",u:"https://www.youtube.com/results?search_query=statquest+lora"},{t:"Knowledge Distillation",c:"",u:"https://www.youtube.com/results?search_query=knowledge+distillation+explained+simply"}],
code:"# LoRA concept\nimport numpy as np\nW_frozen = np.random.randn(4096, 4096)  # 16.7M params (frozen)\nA = np.random.randn(4096, 16) * 0.01     # 65K params (trainable)\nB = np.random.randn(16, 4096) * 0.01     # 65K params (trainable)\nW_adapted = W_frozen + A @ B  # adapted!\nprint(f'Original: {W_frozen.size:,} params')\nprint(f'LoRA: {A.size + B.size:,} params')  # 131K vs 16.7M",
draw:"Draw the decision tree: Task → Can prompting solve it? → RAG if needs knowledge → Fine-tune if needs behavioral change. Draw LoRA: big frozen W matrix + small A×B adapter matrices added alongside.",
quiz:{q:"When would you use prompting vs RAG vs fine-tuning?",a:"Prompting: try first, no training needed. Works for many tasks. Limited by context window and existing knowledge. RAG: when model needs specific/current knowledge it wasn't trained on. No training — just provide documents at inference. Fine-tuning: when you need to change behavior, style, or deep domain expertise. Requires data and compute. LoRA makes fine-tuning affordable (99% fewer params). Often combine: fine-tune base + RAG for knowledge = best results."},
followups:[{q:"How does LoRA work?",a:"Instead of updating a full weight matrix W (4096×4096 = 16.7M params), add two small matrices: A (4096×r) and B (r×4096) where r is small (8-64). W_new = W_frozen + A×B. Only A and B are trained — 131K params at r=16. During inference, merge LoRA into base (W_final = W + A×B) — zero extra latency. QLoRA quantizes the base to 4-bit first, so a 65B model fits on a consumer GPU."}],
actions:["Fine-tune a small BERT on classification with HuggingFace","Try LoRA fine-tuning with PEFT library","Quantize a model to int8 and compare speed/accuracy"]},

{id:"time_series",lv:10,cat:"applied",name:"Time series",desc:"Stationarity, autocorrelation, ARIMA, walk-forward, your stock dashboard",
w:"What's special: data is ordered in time, observations are NOT independent, you can NEVER randomly split. Components: trend (long-term direction), seasonality (repeating patterns — December sales spikes), cyclical (irregular waves — business cycles), residual (noise). Stationarity: statistical properties don't change over time. Most models require it. ADF test: p < 0.05 → stationary. How to achieve: differencing (y'_t = y_t - y_{t-1} removes trend), log transform (stabilizes variance). Autocorrelation: correlation with lagged self. ACF includes indirect effects. PACF: direct effect only. Patterns tell you ARIMA parameters. ARIMA(p,d,q): AR (past p values), I (d times differencing), MA (past q errors). ML approach: XGBoost with lag features (lag_1, lag_7, rolling_7_mean, pct_change) — surprisingly effective. DL: LSTM. NEVER randomly split: walk-forward validation only. Train 1-3, test 4. Train 1-4, test 5. Your stock dashboard: XGBoost + LSTM ensemble, 200+ features from 5 sources, key challenge was preventing look-ahead bias by anchoring FRED features to publication dates and zero-imputing sparse Reddit data.",
why:"Your stock dashboard project. Finance roles test this. Getting the train/test split wrong = data leakage = fake results.",
hot:"Know stationarity and ADF test. NEVER randomly split. Mention your stock dashboard: 'I anchored FRED features to actual availability dates and zero-imputed Reddit sentiment to prevent look-ahead bias.'",
guide:"Guide Part 6",prereqs:["rnn_lstm","xgboost","cross_val"],
videos:[{t:"Time Series Analysis",c:"StatQuest",u:"https://www.youtube.com/results?search_query=statquest+time+series"},{t:"ARIMA",c:"StatQuest",u:"https://www.youtube.com/results?search_query=statquest+arima"}],
code:"from statsmodels.tsa.stattools import adfuller\nimport pandas as pd\n\nresult = adfuller(series)\nprint(f'ADF: {result[0]:.4f}, p: {result[1]:.4f}')\n\n# Lag features for XGBoost\ndf['lag_1'] = df['value'].shift(1)\ndf['lag_7'] = df['value'].shift(7)\ndf['rolling_7'] = df['value'].rolling(7).mean()",
draw:"Draw time series with trend, seasonality, residual labeled. Draw walk-forward: expanding train windows, always test next period. Draw differencing: original series → first differences.",
quiz:{q:"Your stock model has amazing backtest results. What's the first thing to check?",a:"Look-ahead bias / data leakage. (1) Did I randomly split instead of chronologically? (2) Are features using future info? (3) For FRED macro data, am I using publication date (with lag) or period-end date? (4) Am I forward-filling sparse data (Reddit) which implies future absence knowledge? These are exactly the issues I handled in my stock dashboard."},
followups:[{q:"What is stationarity?",a:"A time series is stationary if mean, variance, and autocorrelation don't change over time. If mean was 100 last year and 200 this year, a model trained on last year's data fails. Differencing removes trends: y'_t = y_t - y_{t-1}. ADF test checks: p < 0.05 → stationary."}],
actions:["Test a stock series for stationarity with ADF","Create lag features and train XGBoost vs ARIMA","Implement walk-forward validation, compare to random split"]},

{id:"mlops",lv:10,cat:"applied",name:"MLOps & deployment",desc:"Docker, FastAPI, monitoring, drift detection, model versioning, GPU/CPU",
w:"Docker: containerize your model + dependencies so it runs the same everywhere. FastAPI/Flask: build REST APIs so other applications can call your model. Cloud: AWS SageMaker, GCP Vertex AI, Azure ML — deploy at scale. MLflow: experiment tracking (log metrics, parameters, models), model versioning (which model is in production?), model registry. CI/CD for ML: automated testing (data quality, model performance), automated retraining pipelines. Data drift: input distribution changes (customers' demographics shift). Concept drift: input→output relationship changes (what predicted churn in 2020 doesn't work in 2025). Detection: monitor feature distributions (KL divergence, KS test), prediction distributions, performance metrics. Resolution: retrain on recent data, sliding windows, trigger-based retraining. Batch serving: precompute predictions periodically (nightly recommendations). Real-time: API computes on demand (fraud detection). GPU vs CPU: GPUs have thousands of small cores for parallel matrix math. Neural networks ARE matrix math → 10-100× faster on GPUs. Distributed training: data parallelism (split data across GPUs) or model parallelism (split model). Mixed precision: fp16 for forward/backward, fp32 for updates. 2× speedup, less memory.",
why:"What separates ML engineers from data scientists. YOU HAVE THIS from Infera: FastAPI, Docker, pgvector, REST API, Python SDK.",
hot:"Mention your stack: 'Infera is served via FastAPI, containerized with Docker, embeddings in pgvector.' Know data drift vs concept drift. Know batch vs real-time tradeoffs.",
guide:"Guide 7.5 — MLOps",prereqs:["rf","xgboost","finetuning"],
videos:[{t:"MLOps explained",c:"IBM Technology",u:"https://www.youtube.com/results?search_query=mlops+explained+simply"}],
code:"from fastapi import FastAPI\napp = FastAPI()\n\n@app.post('/predict')\nasync def predict(query: str):\n    emb = finbert.encode(query)\n    results = pgvector.search(emb, top_k=10)\n    return {'results': results}\n\n# Docker: FROM python:3.11 / COPY . /app / RUN pip install -r requirements.txt\n# CMD ['uvicorn', 'main:app', '--host', '0.0.0.0']",
draw:"Draw ML pipeline: Data → Features → Train → Evaluate → Docker → Cloud → Monitor → Drift detection → Retrain (feedback loop).",
quiz:{q:"What's the difference between data drift and concept drift?",a:"Data drift: INPUT distribution changes (e.g., customer demographics shift post-pandemic — different ages, locations, spending patterns). Concept drift: the RELATIONSHIP between inputs and target changes (what predicted churn in 2020 doesn't predict churn in 2025 because customer behavior evolved). Both require retraining, but concept drift is harder to detect because inputs might look the same while outcomes change. Monitor both input distributions and model performance."},
followups:[{q:"Batch vs real-time serving?",a:"Batch: precompute predictions periodically (nightly recommendation refresh). Simple, cheap, high throughput. Real-time: compute on demand via API. Low latency, reacts to current state. Use for: fraud detection (instant decisions), search ranking, chatbots. Tradeoff: batch is simpler, real-time needs infrastructure for low latency."}],
actions:["Dockerize a FastAPI model serving endpoint","Set up MLflow experiment tracking","Build a simple drift detector comparing training vs recent feature distributions"]},

{id:"system_design",lv:10,cat:"applied",name:"ML system design",desc:"FRAMED framework, case studies (spam, recommendations, fraud), fairness & bias",
w:"FRAMED: (1) Frame — what's the business problem, what metric, what ML task type? (2) Requirements — latency, throughput, scale, real-time or batch? (3) Architecture — data ingestion → feature engineering → training → serving → monitoring. (4) Model — start with baseline (logistic regression), justify complexity. (5) Evaluation — offline metrics + online A/B testing. (6) Deployment — serve, update, monitor for drift. Case studies — Spam: binary classification, favor PRECISION (don't send real email to spam), start with logistic reg + TF-IDF, try XGBoost, then BERT. Recommendations: collaborative filtering ('users who liked X liked Y' — matrix factorization) + content-based ('similar genre/director'). Cold start: new users → popularity-based. Evaluation: precision@k, NDCG, A/B on engagement. Fraud: extreme imbalance (<1%), favor RECALL, feature engineering is king (velocity: transactions/hour, amount deviation, location anomaly, device fingerprint), XGBoost with class weights, real-time scoring. Fairness — sources: biased training data, biased labels, proxy features (zip code → race). Metrics: demographic parity (equal positive rates across groups), equalized odds (equal TPR and FPR across groups). These mathematically CONFLICT — impossibility theorems say you can't satisfy all criteria simultaneously. Mitigation: pre-processing (rebalance data), in-processing (fairness constraints in loss), post-processing (adjust thresholds per group).",
why:"Senior interviewers test end-to-end thinking. Shows you can solve BUSINESS PROBLEMS, not just fit models in notebooks.",
hot:"Always start with baseline. Always mention metrics AND monitoring AND A/B testing. Know fairness tradeoffs exist. Use FRAMED structure for any design question.",
guide:"Guide 7.1-7.4 (System Design), 7.6 (Fairness)",prereqs:["rf","xgboost","anomaly","rag","mlops"],
videos:[{t:"ML System Design",c:"Chip Huyen",u:"https://www.youtube.com/results?search_query=chip+huyen+ml+system+design"},{t:"Fairness in ML",c:"",u:"https://www.youtube.com/results?search_query=fairness+machine+learning+explained"}],
code:"# FRAMED template\nframework = {\n    'Frame': 'Business problem? Metric? ML task?',\n    'Requirements': 'Latency? Scale? Real-time or batch?',\n    'Architecture': 'Pipeline: data → features → model → serve → monitor',\n    'Model': 'Baseline (logistic reg) → XGBoost → deep learning if justified',\n    'Evaluation': 'Offline (precision/recall/F1) + Online (A/B test)',\n    'Deployment': 'Serve, version, monitor drift, retrain'\n}",
draw:"Draw FRAMED as a flowchart. Draw a complete fraud detection system: transaction → feature engineering → real-time scoring → alert → human review → feedback → retrain.",
quiz:{q:"Design a spam detection system.",a:"Frame: binary classification, optimize PRECISION (don't lose real emails). Metric: precision, recall, F1, with precision threshold ≥ 0.95. Requirements: real-time, low latency (<100ms). Architecture: email → extract features (TF-IDF on text, sender reputation, link count, header analysis) → model → spam/inbox. Model: logistic regression + TF-IDF baseline → XGBoost → BERT fine-tuning if needed. Evaluation: precision/recall on holdout, A/B test (small % of users). Deployment: API, monitor false positive rate daily, retrain monthly as spam evolves."},
followups:[{q:"What are fairness considerations in ML?",a:"Demographic parity: equal positive prediction rates across demographic groups. Equalized odds: equal TPR AND FPR across groups. Individual fairness: similar people get similar predictions. These criteria mathematically conflict — improving one can worsen another (impossibility theorems). Sources of bias: training data reflects historical discrimination, labels annotated with bias, proxy features like zip code correlating with race. No single solution — it requires explicit tradeoff decisions."}],
actions:["Design a recommendation system using FRAMED — write it out fully","Design fraud detection and identify which fairness metrics apply","Practice explaining a system design for 5 minutes out loud — time yourself"]}

// ═══ MISCONCEPTION TRAPS (common wrong answers interviewers catch) ═══
const TRAPS={
probability:"TRAP: 'p-value = probability the null is true.' WRONG. It's 'probability of this data IF null is true.' Also: P(A|B) ≠ P(B|A) — the prosecutor's fallacy.",
distributions:"TRAP: 'Everything is normally distributed.' WRONG. CLT says sample MEANS are normal, not the data itself. Also: 'n=30 makes anything normal' — 30 is a rough guideline, not a rule.",
hypothesis:"TRAP: '95% confidence interval means 95% chance the true value is inside.' WRONG. It means if you repeated the experiment 100 times, ~95 intervals would contain it. Also: statistical significance ≠ practical significance.",
bias_var:"TRAP: 'More complex models are always better.' WRONG. They reduce bias but increase variance. Also: 'Good training accuracy means the model works' — could be overfitting.",
loss_fn:"TRAP: 'Just use MSE for everything.' WRONG for classification — non-convex with sigmoid. Also: 'Lower loss always means better model' — could be overfitting to training data.",
log_reg:"TRAP: 'Logistic regression is a regression algorithm.' It predicts a continuous value (log-odds) but is used for CLASSIFICATION. Also: 'Higher accuracy = better model' — not with imbalanced data.",
regularization:"TRAP: 'L1 and L2 do the same thing.' WRONG. L1 zeros out weights (feature selection), L2 just shrinks them. The geometry (diamond vs circle) is WHY.",
class_metrics:"TRAP: 'High accuracy = good model.' WRONG for imbalanced data. Also: 'AUC = 0.5 means the model is random' — yes, but AUC > 0.5 doesn't mean it's useful (could still have terrible precision).",
neural_net:"TRAP: 'More layers = better.' WRONG — vanishing gradients, overfitting. Also: 'Neural nets find the global minimum.' They don't — loss is non-convex. They find local minima that are usually good enough.",
cnn:"TRAP: 'CNNs only work for images.' WRONG — also used for 1D signals (audio, time series) and even text. Also: 'The network designer chooses what kernels detect.' WRONG — the network LEARNS what to detect.",
rnn_lstm:"TRAP: 'LSTMs solve the vanishing gradient problem completely.' They mitigate it significantly but can still struggle with very long sequences. Transformers handle long-range better.",
attention:"TRAP: 'Attention replaces everything else in the network.' WRONG — attention computes relevance weights, but FFN layers (which are most of the parameters) store the actual knowledge.",
transformer:"TRAP: 'Transformers understand word order naturally.' WRONG — they process all positions simultaneously with NO inherent order. Positional encoding must be added explicitly.",
bert:"TRAP: 'BERT can generate text.' WRONG — BERT is encoder-only (bidirectional). It understands text but can't generate. GPT generates. Also: 'Fine-tuning = training from scratch.' WRONG — you're adjusting a pre-trained model.",
gpt:"TRAP: 'LLMs understand and reason.' Debatable — they predict likely next tokens. They produce text that LOOKS like reasoning. Also: 'RLHF makes the model truthful.' It makes it more aligned with human preferences, not necessarily more factual.",
rag:"TRAP: 'RAG eliminates hallucination.' WRONG — it reduces it by grounding in documents, but the LLM can still hallucinate or misinterpret retrieved context. Also: 'More retrieved chunks = better.' Too many chunks dilute with irrelevant context.",
cross_val:"TRAP: 'Cross-validation prevents overfitting.' WRONG — it DETECTS overfitting by giving reliable performance estimates. The model can still overfit within each fold.",
xgboost:"TRAP: 'XGBoost is always better than Random Forest.' NOT always — RF is more robust with less tuning, handles noisy data better, and is faster to train. XGBoost needs careful hyperparameter tuning."
};

// ═══ EXTRA FOLLOW-UPS for deeper probing ═══
const EXTRA_FU={
attention:[
{q:"What happens if you DON'T scale by √d_k?",a:"Dot products grow proportionally to dimension d. For d=512, the sum of 512 multiplications produces large values. Softmax on large values produces near-one-hot distributions (one position gets ~1.0, rest ~0.0). Gradients in these saturated regions are near zero → learning stalls. Scaling by √d keeps values in a range where softmax produces meaningful, learnable distributions."},
{q:"How would you modify attention for very long sequences?",a:"Standard attention is O(n²). For long sequences: Sparse attention (attend only to local windows + global tokens), Sliding window attention (each token attends to k nearest neighbors), Flash Attention (memory-efficient implementation, same math but avoids materializing the n×n attention matrix), Linear attention (approximate attention in O(n) with kernel tricks). These enable 100K+ token context windows."},
{q:"If attention can look at everything, why do we need multiple layers?",a:"One attention layer computes direct pairwise relationships. Multiple layers build COMPOSITIONAL understanding: layer 1 might learn 'it refers to animal,' layer 2 uses that to understand 'it was tired means the animal was tired,' layer 3 uses that for the full sentence meaning. Each layer refines and combines the representations from the previous layer."}
],
transformer:[
{q:"What's the role of the feed-forward network in each Transformer layer?",a:"The FFN (two dense layers with ReLU) is applied to each position independently. It's where the model stores and retrieves 'knowledge' — factual associations, learned patterns. The attention layers route information between positions; the FFN layers process information AT each position. FFN layers contain most of the model's parameters."},
{q:"What happens during the very first token of generation?",a:"The model receives just the prompt tokens. It processes them all through the Transformer (encoder or decoder depending on architecture), computes attention across all prompt tokens, and outputs a probability distribution over the vocabulary for the next token. The first generated token sets the direction for everything that follows — which is why prompt engineering matters so much."}
],
bert:[
{q:"Why mask 80/10/10 instead of 100% [MASK]?",a:"If always [MASK], the model only learns to predict [MASK] tokens — but at fine-tuning/inference, there are no [MASK] tokens. The 10% random replacement teaches robustness to noise. The 10% unchanged teaches the model that it sometimes needs to reconstruct the original word. This bridges the gap between pre-training and downstream use."},
{q:"How does fine-tuning BERT differ from training from scratch?",a:"From scratch: random weights, needs millions of examples, learns language AND your task simultaneously. Fine-tuning: weights already encode deep language understanding from pre-training on billions of words. Your small dataset (even thousands of examples) just teaches the specific task — sentiment, NER, QA. The pre-trained knowledge transfers. It's like hiring an English speaker vs teaching a baby English AND legal writing."}
],
gpt:[
{q:"What is DPO and why is it replacing RLHF?",a:"DPO (Direct Preference Optimization) skips the reward model entirely. Instead of: train reward model → use PPO to optimize against it, DPO directly optimizes the language model on preference pairs. It treats the LM itself as the reward model via a clever mathematical reformulation. Benefits: simpler pipeline (no reward model training, no RL instability), more stable training, similar results. Drawback: less flexible than RLHF for complex reward shaping."},
{q:"What are emergent abilities and why are they controversial?",a:"Abilities that appear suddenly at scale — small models can't do them at all, large models can (chain-of-thought, in-context learning). Controversial because: some researchers argue it's an artifact of metric choice (using accuracy which has a sharp threshold vs log-likelihood which improves smoothly). The debate matters because it affects whether we can predict what future models will be able to do."}
],
loss_fn:[
{q:"Why does cross-entropy correspond to maximum likelihood estimation?",a:"MLE asks: what parameters make my data most likely? For binary classification with Bernoulli outcomes, the likelihood is: Π ŷᵢʸⁱ × (1-ŷᵢ)^(1-yᵢ). Taking the negative log gives: -Σ[yᵢ log(ŷᵢ) + (1-yᵢ) log(1-ŷᵢ)] — which IS binary cross-entropy. So minimizing cross-entropy = maximizing likelihood under Bernoulli assumption. Similarly, minimizing MSE = maximizing likelihood under Gaussian noise assumption."},
{q:"When would you use contrastive or triplet loss?",a:"When you're learning an embedding space where similar things should be close and dissimilar things far apart. Contrastive: pairs of examples (similar/dissimilar). Triplet: anchor + positive + negative, requires distance(anchor,positive) + margin < distance(anchor,negative). Used in face recognition (FaceNet), sentence similarity (Sentence-BERT), and your Infera project (FinBERT was trained with objectives that shape the embedding space this way)."}
],
bias_var:[
{q:"Can you have high bias AND high variance simultaneously?",a:"Rarely in the classical sense, but yes with a poorly chosen model. Example: fitting a high-degree polynomial to one region of data and a constant to another. More commonly, you see one dominating. The key insight is that as you move along the complexity axis, you trade one for the other. Cross-validation lets you find the sweet spot empirically."},
{q:"How does ensemble learning relate to bias-variance?",a:"Bagging (Random Forest) reduces variance: averaging many high-variance models cancels individual noise. Boosting (XGBoost) reduces bias: each model corrects the previous one's systematic errors. Stacking can reduce both: diverse models capture different patterns, meta-model learns optimal combination. This is why ensembles almost always outperform single models."}
],
rf:[
{q:"Why does each tree only see ~63% of the data?",a:"Bootstrap sampling draws n samples WITH replacement from n total. The probability of any single sample NOT being selected in n draws is (1-1/n)^n ≈ e^(-1) ≈ 0.37. So ~37% is left out (out-of-bag), and ~63% is used. The replacement means some samples appear multiple times, giving each tree a slightly different view of the data — which is the whole point of bagging."},
{q:"How does permutation importance differ from Gini importance?",a:"Gini importance: how much each feature reduces impurity across all splits in all trees. Fast but biased toward high-cardinality features (features with many unique values get more split opportunities). Permutation importance: shuffle each feature's values and measure accuracy drop. Unbiased and model-agnostic, but slower. Use permutation importance for reliable feature selection."}
]
};

// ═══ MOCK INTERVIEW ENGINE ═══
let mockState = null;

function startMock(){
const shuffled = [...N].sort(()=>Math.random()-0.5);
mockState = {
    questions: shuffled.slice(0, 10),
    current: 0,
    score: 0,
    misses: [],
    startTime: Date.now(),
    qStartTime: Date.now()
};
renderMockQ();
document.getElementById('mock-overlay').classList.add('open');
startMockTimer();
}

function closeMock(){
document.getElementById('mock-overlay').classList.remove('open');
mockState = null;
if(window._mockTimer) clearInterval(window._mockTimer);
}

function startMockTimer(){
if(window._mockTimer) clearInterval(window._mockTimer);
window._mockTimer = setInterval(()=>{
    if(!mockState) return;
    const el = document.getElementById('mock-time');
    if(!el) return;
    const elapsed = Math.floor((Date.now() - mockState.qStartTime) / 1000);
    const mins = Math.floor(elapsed / 60);
    const secs = elapsed % 60;
    el.textContent = `${mins}:${secs.toString().padStart(2,'0')}`;
    if(elapsed > 180) el.style.color = '#f85149';
}, 1000);
}

function renderMockQ(){
const panel = document.getElementById('mock-panel');
if(mockState.current >= mockState.questions.length){
    renderMockScore(); return;
}
const n = mockState.questions[mockState.current];
const col = CC[n.cat];
const trap = TRAPS[n.id] || '';
const extraFu = EXTRA_FU[n.id] || [];
const allFu = [...n.followups, ...extraFu];
const randomFu = allFu.length > 0 ? allFu[Math.floor(Math.random()*allFu.length)] : null;

panel.innerHTML = `
<div class="mock-header">
    <h2>Mock Interview</h2>
    <div><span class="mock-timer" id="mock-time">0:00</span></div>
</div>
<div class="mock-progress">Question ${mockState.current+1} of ${mockState.questions.length} · Score: ${mockState.score}/${mockState.current}</div>
<span class="mock-cat" style="background:${col}18;color:${col};border:1px solid ${col}44">${n.name}</span>
<div class="mock-q"><div class="mql">Interviewer asks:</div><div class="mqt">${n.quiz.q}</div></div>
<button class="qbtn rv-btn" id="mock-reveal" onclick="
    document.getElementById('mock-ans').classList.add('show');
    ${trap ? "document.getElementById('mock-trap-box').classList.add('show');" : ''}
    ${randomFu ? "document.getElementById('mock-fu').classList.add('show');" : ''}
    this.style.display='none';
    document.getElementById('mock-grade').style.display='flex';
">Think about your answer, then reveal</button>
<div class="mock-a" id="mock-ans"><div class="mal">Model answer</div><div class="mat">${n.quiz.a}</div></div>
${trap ? `<div class="mock-trap" id="mock-trap-box"><div class="mtl">Common misconception trap</div><div class="mtt">${trap}</div></div>` : ''}
${randomFu ? `<div class="mock-a" id="mock-fu"><div class="mal">Follow-up: ${randomFu.q}</div><div class="mat">${randomFu.a}</div></div>` : ''}
<div class="mock-btns" id="mock-grade" style="display:none;margin-top:12px">
    <button class="qbtn gt-btn" onclick="mockGrade(true)">I nailed it ✓</button>
    <button class="qbtn ms-btn" onclick="mockGrade(false)">I went blank / wrong ✗</button>
</div>
<div style="margin-top:16px;text-align:right"><button class="qbtn" style="border:1px solid #30363d;color:#8b949e" onclick="closeMock()">End interview</button></div>`;
mockState.qStartTime = Date.now();
}

function mockGrade(passed){
if(passed) mockState.score++;
else mockState.misses.push(mockState.questions[mockState.current]);
mockState.current++;
renderMockQ();
}

function renderMockScore(){
if(window._mockTimer) clearInterval(window._mockTimer);
const pct = Math.round(mockState.score / mockState.questions.length * 100);
const totalTime = Math.floor((Date.now() - mockState.startTime) / 1000);
const mins = Math.floor(totalTime / 60);
const secs = totalTime % 60;
let grade, color, msg;
if(pct >= 90){ grade='A+'; color='#3fb950'; msg='Interview ready. Go get that offer.'; }
else if(pct >= 80){ grade='A'; color='#3fb950'; msg='Strong. Patch the gaps and you\'re there.'; }
else if(pct >= 70){ grade='B'; color='#58a6ff'; msg='Decent foundation. Drill the misses.'; }
else if(pct >= 50){ grade='C'; color='#f0883e'; msg='Getting there but real gaps remain. Keep studying.'; }
else{ grade='F'; color='#f85149'; msg='Back to the tree. Watch the videos. Run the code. Try again tomorrow.'; }

const panel = document.getElementById('mock-panel');
panel.innerHTML = `
<div class="mock-score">
    <h2>Mock Interview Complete</h2>
    <div class="grade" style="color:${color}">${grade}</div>
    <p>${mockState.score} / ${mockState.questions.length} correct (${pct}%) in ${mins}m ${secs}s</p>
    <p style="margin-top:8px;color:${color}">${msg}</p>
    ${mockState.misses.length > 0 ? `
    <div class="mock-misses">
        <h3>Concepts to drill:</h3>
        ${mockState.misses.map(n=>`<div class="mm">→ ${n.name}: ${n.quiz.q.slice(0,80)}...</div>`).join('')}
    </div>` : ''}
    <div style="margin-top:20px">
        <button class="qbtn gt-btn" onclick="startMock()">Try again</button>
        <button class="qbtn rv-btn" onclick="closeMock()">Back to tree</button>
    </div>
</div>`;
}

render();
</script>
</body>
</html>
