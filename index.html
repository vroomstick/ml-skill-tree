{id:"lin_reg",lv:4,cat:"coreml",name:"Linear regression",desc:"ŷ = Σwx + b, 5 assumptions, multicollinearity, closed-form vs GD",
w:"Predicts continuous numbers by fitting a line/hyperplane. Equation: ŷ = w₁x₁ + w₂x₂ + ... + b. Like a recipe: '2× sqft + 50× bedrooms - 10× age + 100,000 = price.' Each feature gets a weight (multiplier), there's a bias (base amount). Learns by minimizing MSE via gradient descent OR the closed-form normal equation: w = (XᵀX)⁻¹Xᵀy (direct solution, but O(n³) matrix inversion is slow for big data). 5 assumptions: (1) Linear relationship, (2) Independent errors, (3) Homoscedasticity (constant error variance — errors shouldn't fan out for larger predictions), (4) Normally distributed residuals (for valid confidence intervals), (5) No multicollinearity. Multicollinearity: two features measuring basically the same thing (height in cm and inches). The model can't decide which gets credit — coefficients become unstable and flip-flop wildly. Model still predicts fine, but you can't interpret individual weights. Detect with correlation matrix (|r| > 0.8) or VIF (>5 is a flag). Fix: drop one correlated feature, combine with PCA, or use Ridge regression (L2 handles it naturally).",
why:"Simplest model. Foundation for everything else. Always your regression baseline. Interpretable coefficients. Shows statistical maturity.",
hot:"Know ALL 5 assumptions. Know multicollinearity (what, VIF, fixes). Know closed-form exists but GD scales better. Always mention as FIRST baseline.",
guide:"Guide 2.5",prereqs:["grad_desc","loss_fn","feat_eng"],
videos:[{t:"Linear Regression",c:"StatQuest",u:"https://www.youtube.com/results?search_query=statquest+linear+regression+clearly+explained"}],
code:"from sklearn.linear_model import LinearRegression\nimport numpy as np\n\nX = np.array([[1500,3],[2000,4],[1200,2],[1800,3]])\ny = np.array([300000,400000,250000,350000])\nmodel = LinearRegression().fit(X, y)\nprint('Weights:', model.coef_)  # per sqft, per bedroom\nprint('Bias:', model.intercept_)\nprint('Predict 1600sqft 3bed:', model.predict([[1600,3]]))",
draw:"Draw scatterplot with best-fit line. Label residuals (vertical distances from points to line). Draw the 5 assumptions: show what violated homoscedasticity looks like (fan-shaped residuals).",
quiz:{q:"What are the 5 assumptions of linear regression?",a:"(1) Linear relationship between features and target. (2) Independence of errors (residuals don't correlate). (3) Homoscedasticity (constant error variance — residual spread shouldn't change with X). (4) Normality of residuals (for valid CIs and p-values). (5) No multicollinearity (features not highly correlated). Most important violations: #3 → use robust regression or transform target. #5 → drop features, use PCA, or use Ridge."},
followups:[{q:"What is multicollinearity and why is it a problem?",a:"When features are highly correlated (height in cm and inches). The model can't tell which feature drives the prediction — coefficients become unstable and flip-flop with small data changes. Predictions are fine, but you can't interpret individual weights. Detect with VIF > 5. Fix: drop one, combine via PCA, or use Ridge regression (L2 regularization stabilizes coefficients)."}],
actions:["Train linear regression and check residual plots for assumption violations","Compute VIF for all features, identify multicollinearity","Compare gradient descent solution vs sklearn closed-form — verify they match"]},

{id:"log_reg",lv:4,cat:"coreml",name:"Logistic regression",desc:"Sigmoid, cross-entropy, softmax for multiclass, decision boundary",
w:"Despite the name, this is for CLASSIFICATION. How it works: take the linear equation (Σwx + b), pass through the sigmoid function σ(z) = 1/(1+e⁻ᶻ) which squishes any real number into (0,1) — interpreted as probability. Sigmoid: looks like an S-curve. Very negative → ~0, very positive → ~1, zero → exactly 0.5. Decision boundary: predict class 1 if P ≥ 0.5 (threshold adjustable). Loss: binary cross-entropy (see loss functions node). NOT MSE because sigmoid + MSE is non-convex. Multiclass: One-vs-Rest (train k binary classifiers, one per class, pick most confident) or Softmax regression (single model outputs probability for ALL classes, sum to 1). Softmax: takes raw scores (logits), applies exponential (makes bigger scores disproportionately larger), divides by sum so outputs are probabilities summing to 1.",
why:"THE classification baseline. Always mention first before complex models. Interpretable coefficients (log-odds ratios). Saying 'I'd start with logistic regression' shows maturity.",
hot:"Know sigmoid squishes to (0,1). Know WHY cross-entropy not MSE (convexity). Know softmax for multiclass. 'I'd start with logistic regression as a baseline' = instant credibility signal.",
guide:"Guide 2.6",prereqs:["grad_desc","loss_fn","feat_eng"],
videos:[{t:"Logistic Regression",c:"StatQuest",u:"https://www.youtube.com/results?search_query=statquest+logistic+regression+clearly+explained"}],
code:"from sklearn.linear_model import LogisticRegression\nfrom sklearn.metrics import classification_report\nimport numpy as np\n\ndef sigmoid(z): return 1/(1+np.exp(-z))\nprint([f'{x}: {sigmoid(x):.3f}' for x in [-5,-2,0,2,5]])\n\nmodel = LogisticRegression().fit(X_train, y_train)\nprint(classification_report(y_test, model.predict(X_test)))\nprint('Probabilities:', model.predict_proba(X_test[:3]))",
draw:"Draw sigmoid curve: x-axis = real numbers, y-axis = 0 to 1. Mark z=0 → P=0.5. Show decision boundary on 2D scatter plot: line separating two classes.",
quiz:{q:"Why is it called logistic 'regression' if it's for classification?",a:"It predicts a continuous number — the log-odds ratio — using a linear equation. That's the regression part. Then sigmoid converts log-odds to probability, and a threshold converts probability to class. The underlying model IS regression on log-odds; the classification comes from thresholding the probability output."},
followups:[{q:"What's softmax and when do you use it?",a:"Softmax converts a vector of raw scores (logits) to probabilities summing to 1: softmax(zᵢ) = eᶻⁱ / Σeᶻʲ. Use for multiclass classification (3+ classes). Each output neuron represents one class. The exponential makes larger scores disproportionately larger, creating a 'winner-take-more' effect while maintaining differentiability."}],
actions:["Implement sigmoid from scratch and plot it","Train logistic regression and visualize the decision boundary on 2D data","Adjust threshold from 0.5 to 0.3 and observe precision/recall changes"]},

{id:"regularization",lv:4,cat:"coreml",name:"Regularization",desc:"L1/Lasso, L2/Ridge, Elastic Net, why L1 zeros weights, lambda tuning",
w:"The problem: without guardrails, a model can make weights HUGE, overfitting to noise. The solution: add a penalty on weight magnitude to the loss: total_loss = original_loss + λ × penalty. L1 (Lasso): penalty = Σ|wᵢ|. Effect: drives some weights to exactly zero → automatic feature selection. Like a strict teacher: 'pick your 5 best study topics.' WHY L1 zeros but L2 doesn't: geometrically, L1 creates a diamond-shaped constraint region. The loss contours (ellipses) are more likely to intersect the diamond at a corner (where some coordinates are exactly 0) than the smooth curve of L2's circle. L2 (Ridge): penalty = Σwᵢ². Effect: shrinks all weights toward zero but never exactly zero. Every feature still contributes, just more modestly. Handles multicollinearity well. Like a teacher: 'study everything, don't obsess over any one topic.' Elastic Net: αL1 + (1-α)L2. Gets feature selection from L1 AND grouped selection from L2 (keeps correlated features together rather than L1's arbitrary one-from-group). Regularization strength (λ): higher = stronger penalty = simpler model = less overfitting but risk underfitting. λ = 0 means no regularization. This is a hyperparameter you tune via cross-validation.",
why:"Primary tool for preventing overfitting. L1 does automatic feature selection. Ridge fixes multicollinearity. Understanding regularization deeply shows you understand the bias-variance tradeoff at a practical level.",
hot:"Know WHY L1 zeros (diamond vs circle geometry). Know Elastic Net for correlated features. Know that dropout in neural nets is conceptually similar to regularization. Know how to tune λ.",
guide:"Guide 2.7",prereqs:["lin_reg","log_reg","bias_var"],
videos:[{t:"Ridge Regression (L2)",c:"StatQuest",u:"https://www.youtube.com/results?search_query=statquest+ridge+regression"},{t:"Lasso Regression (L1)",c:"StatQuest",u:"https://www.youtube.com/results?search_query=statquest+lasso+regression"}],
code:"from sklearn.linear_model import Ridge, Lasso, ElasticNet\nimport numpy as np\n\n# Only features 0,1 actually matter\nX = np.random.randn(100, 10)\ny = 3*X[:,0] + 2*X[:,1] + np.random.randn(100)*0.1\n\nfor name, m in [('Ridge',Ridge(1.0)),('Lasso',Lasso(0.1))]:\n    m.fit(X, y)\n    zeros = sum(abs(c) < 0.01 for c in m.coef_)\n    print(f'{name}: {zeros} zero coefficients')\n    print(f'  Coefs: {np.round(m.coef_, 2)}')",
draw:"Draw the L1 diamond and L2 circle constraint regions in 2D weight space. Show how the loss contour ellipse intersects the diamond at a corner (w₂ = 0) but the circle at a smooth non-zero point. This IS why L1 does feature selection.",
quiz:{q:"Why does L1 regularization produce exactly zero weights but L2 doesn't?",a:"Geometrically: L1 creates a diamond-shaped constraint region, L2 creates a circle. The loss function's contour ellipses are more likely to touch the diamond at a corner (where one or more coordinates are exactly 0) than the smooth curve of the circle (no corners). This is why L1 does automatic feature selection — irrelevant features get zeroed out — while L2 just shrinks everything toward zero without eliminating anything."},
followups:[{q:"When would you use Elastic Net over pure L1 or L2?",a:"When you have correlated features AND want feature selection. Pure L1 arbitrarily picks one from a correlated group and zeros the rest. Elastic Net keeps groups of correlated features together while still zeroing truly irrelevant ones. The α parameter controls the L1/L2 mix."}],
actions:["Train Lasso with increasing λ — watch features get zeroed out one by one","Compare Ridge vs Lasso coefficients on data with correlated features","Plot the regularization path: coefficients vs λ"]},

{id:"trees",lv:4,cat:"coreml",name:"Decision trees",desc:"Gini impurity, entropy, information gain, pruning, overfitting",
w:"A tree of yes/no questions. 'Is age > 30? → Yes → Is income > $50K? → Yes → Predict: will buy.' Each question (node) splits data into two groups. The tree picks the best split — the one that creates the purest groups. For classification, purity is measured by: Gini impurity: 1 - Σ(pᵢ²). A pure node (all one class) has Gini = 0. Maximum impurity at 50/50 = 0.5 for binary. Pick the split that reduces Gini the most. Entropy: -Σ(pᵢ · log₂(pᵢ)). Pure = 0, max = 1.0 for binary. Information gain = entropy before - weighted entropy after. Gini vs entropy: give very similar results. Gini is slightly faster to compute. For regression trees: minimize variance within each group (MSE). Pros: highly interpretable ('the model decided this because age > 30 AND income > $50K'), handles mixed feature types (categorical + numerical), no scaling needed. Cons: prone to overfitting (can keep splitting until each leaf has one sample), unstable (small data changes → completely different tree), high variance. Preventing overfitting: max_depth, min_samples_leaf, min_samples_split, pruning (grow full tree, then remove branches that don't improve validation performance).",
why:"The BUILDING BLOCK of Random Forest and XGBoost. You can't understand ensembles without understanding the base learner. Also, single trees are the most interpretable ML model.",
hot:"Know Gini vs entropy (similar results, Gini faster). Key insight: single trees overfit → this is WHY ensembles exist. RF averages to reduce variance, XGBoost builds sequentially to reduce bias.",
guide:"Guide 2.9",prereqs:["feat_eng","eda"],
videos:[{t:"Decision Trees",c:"StatQuest",u:"https://www.youtube.com/results?search_query=statquest+decision+trees+clearly+explained"},{t:"Gini vs Entropy",c:"StatQuest",u:"https://www.youtube.com/results?search_query=statquest+gini+impurity+entropy"}],
code:"from sklearn.tree import DecisionTreeClassifier, export_text\nfrom sklearn.datasets import load_iris\n\nX, y = load_iris(return_X_y=True)\ntree = DecisionTreeClassifier(max_depth=3).fit(X, y)\nprint(export_text(tree, feature_names=load_iris().feature_names))",
draw:"Draw a 3-level decision tree. Label each node: feature, threshold, Gini value, number of samples. Color leaf nodes by predicted class. Show how Gini decreases at each split.",
quiz:{q:"How does a decision tree choose which feature and threshold to split on?",a:"It tries every feature at every possible threshold. For each candidate split, computes weighted impurity (Gini or entropy) of the two child nodes. Picks the split that reduces impurity the most (maximizes information gain). For regression, minimizes variance (MSE) within each group instead. This greedy approach finds the locally optimal split at each node."},
followups:[{q:"Why do single trees overfit, and how does that lead to ensembles?",a:"Trees can keep splitting until every leaf has one sample — perfectly fitting training data including noise. This high-variance behavior is WHY ensembles exist: Random Forest averages many different trees (trained on random subsets) to cancel individual overfitting (reduces variance). XGBoost builds trees sequentially, each fixing errors of the previous ensemble (reduces bias). Single tree = high variance, ensemble = managed tradeoff."}],
actions:["Train a tree with NO depth limit — compare train vs test accuracy","Gradually increase max_depth from 1 to 20, plot both curves — find the sweet spot","Visualize the tree and interpret the decision path for a specific prediction"]},

{id:"svm",lv:4,cat:"coreml",name:"SVM",desc:"Maximum margin, support vectors, kernel trick, C parameter",
w:"Finds the hyperplane that separates classes with the MAXIMUM margin — the biggest gap between the decision boundary and the nearest points from each class. Those nearest points are 'support vectors' (they 'support' the boundary — everything else could be removed without changing it). Why maximum margin? A thin margin is fragile. A wide margin generalizes better to new data. Kernel trick: when data isn't linearly separable (e.g., concentric circles), the kernel trick maps data to a higher-dimensional space where a linear separator exists — WITHOUT computing the transformation explicitly. Common kernels: Linear (no transformation), Polynomial (captures feature interactions up to degree d), RBF/Gaussian (maps to infinite-dimensional space, most flexible but prone to overfitting). C parameter: controls tradeoff between wide margin (more robust, some misclassification allowed) and hard classification (every point correct, thin margin). High C = hard margin (overfit risk), Low C = soft margin (underfit risk). Uses hinge loss (only penalizes wrong or not-confident-enough predictions).",
why:"Tested in interviews because it probes geometric understanding of classification. Less used in production now (XGBoost and deep learning dominate), but the concepts (margin, kernel, regularization via C) are fundamental.",
hot:"Know maximum margin, support vectors, kernel trick (RBF maps to infinite dims), and C parameter. When asked about SVM vs modern alternatives, say 'XGBoost has largely replaced SVM for tabular tasks.'",
guide:"Guide 2.11",prereqs:["log_reg","regularization"],
videos:[{t:"SVM clearly explained",c:"StatQuest",u:"https://www.youtube.com/results?search_query=statquest+support+vector+machines"}],
code:"from sklearn.svm import SVC\nimport numpy as np\n\n# Compare linear vs RBF kernel\nfor kernel in ['linear', 'rbf']:\n    svm = SVC(kernel=kernel, C=1.0)\n    svm.fit(X_train, y_train)\n    print(f'{kernel}: {svm.score(X_test, y_test):.3f}')\n    print(f'  Support vectors: {svm.n_support_}')",
draw:"Draw two groups of dots with a separating line. Show the margin (distance between line and nearest dots). Label support vectors. Show a second example: concentric circles that can't be linearly separated → kernel maps to 3D where a plane separates them.",
quiz:{q:"What is the kernel trick in SVM and why is it useful?",a:"When data isn't linearly separable in its original space (e.g., concentric circles), you need to separate it in a higher dimension. The kernel trick computes dot products in this high-dimensional space WITHOUT actually transforming the data — using a kernel function K(x,y) that equals the dot product of φ(x)·φ(y). RBF kernel maps to infinite-dimensional space. This is computationally efficient because you never compute the actual high-dimensional coordinates."},
followups:[{q:"What does the C parameter control?",a:"C controls the margin-error tradeoff. High C: prioritize classifying every point correctly → thin margin → overfit. Low C: prioritize wide margin → allow some misclassification → more robust but might underfit. It's the regularization parameter of SVM — analogous to λ in Ridge/Lasso but inverted (high C = less regularization)."}],
actions:["Train SVM with C=0.01, 1, 100 — visualize how the decision boundary changes","Compare linear vs RBF kernel on a non-linear dataset","Explain why SVM is less common in 2026 production (XGBoost, deep learning faster/better)"]},

{id:"knn",lv:4,cat:"coreml",name:"KNN & distance metrics",desc:"K neighbors vote, curse of dimensionality, Euclidean vs Manhattan vs cosine",
w:"K-Nearest Neighbors: to classify a new point, find the k closest training points and take a majority vote. No training phase — 'lazy learner' that stores all data and computes at prediction time (O(n) per query). k hyperparameter: k=1 → one neighbor decides (overfitting, sensitive to noise), k=100 → too many distant irrelevant neighbors (underfitting). Use odd k for binary to avoid ties. Curse of dimensionality: as features increase, data becomes sparse. In high dimensions, all points are roughly equidistant — 'closeness' loses meaning. KNN breaks. Fix: PCA first. Distance metrics: Euclidean (straight line, √Σ(aᵢ-bᵢ)², sensitive to scale — MUST normalize), Manhattan (grid distance, Σ|aᵢ-bᵢ|, more robust to outliers), Cosine similarity (angle between vectors, ignores magnitude, cos(θ) = A·B / (||A||×||B||), range -1 to +1, THIS IS THE METRIC FOR TEXT/EMBEDDINGS because direction = semantic meaning, length = document size which shouldn't affect similarity). When to use: Euclidean for low-dim numeric data, Manhattan for different-scale features, Cosine for text/embeddings/high-dimensional sparse data.",
why:"KNN is simple enough to explain in 30 seconds — tests whether you understand distance and dimensionality. Cosine similarity is used in YOUR Infera project for vector search.",
hot:"Mention curse of dimensionality unprompted. Know cosine is THE metric for embeddings (direction > magnitude). Know Euclidean requires scaling.",
guide:"Guide 2.12 (KNN), distance metrics throughout",prereqs:["feat_eng","regularization"],
videos:[{t:"KNN clearly explained",c:"StatQuest",u:"https://www.youtube.com/results?search_query=statquest+knn+clearly+explained"}],
code:"from sklearn.neighbors import KNeighborsClassifier\nfrom sklearn.metrics.pairwise import cosine_similarity\nimport numpy as np\n\n# Cosine similarity — THE metric for text\na = np.array([[1, 2, 3]])\nb = np.array([[2, 4, 6]])  # same direction, different magnitude\nc = np.array([[3, 1, 0]])  # different direction\nprint('Same direction:', cosine_similarity(a, b))  # ~1.0\nprint('Different:', cosine_similarity(a, c))  # lower",
draw:"Draw KNN: a new point surrounded by neighbors of two classes. Show how k=1, k=5, k=15 change the prediction. Draw cosine similarity: two vectors with same angle but different lengths → same cosine → same semantic meaning.",
quiz:{q:"What is the curse of dimensionality and how does it affect KNN?",a:"As dimensions increase, data points become uniformly spread across the space. In 100+ dimensions, the nearest neighbor and farthest neighbor are nearly the same distance away — 'closeness' becomes meaningless. KNN relies entirely on distance to find similar points, so it fails when distance stops discriminating. Fix: reduce dimensionality with PCA before applying KNN, or use a different algorithm entirely (trees don't suffer from this)."},
followups:[{q:"Why is cosine similarity used for text embeddings instead of Euclidean?",a:"Documents vary in length. A 10,000-word article about cats has a larger embedding magnitude than a tweet about cats, but they're both 'about cats.' Cosine measures the ANGLE between vectors (direction = semantic meaning), ignoring magnitude (length). Two documents pointing the same direction in embedding space are semantically similar regardless of length. This is exactly what Infera does — cosine similarity between FinBERT embeddings."}],
actions:["Train KNN with k=1, 5, 20, 50 — plot decision boundaries","Compute Euclidean, Manhattan, and cosine distance between the same vector pairs — compare","Demonstrate curse of dimensionality: show KNN accuracy dropping as you add random features"]},

{id:"naive_bayes",lv:4,cat:"coreml",name:"Naive Bayes",desc:"Bayes theorem + independence assumption, why it works, text classification",
w:"A probabilistic classifier using Bayes' theorem with the 'naive' assumption that all features are independent given the class. For each class, compute: P(class|features) ∝ P(class) × P(feature₁|class) × P(feature₂|class) × ... Pick the class with highest probability. Why 'naive'? The independence assumption is almost never true. 'Win' and 'free' DO co-occur more in spam. But it works surprisingly well — the RANKINGS of class probabilities are often correct even when the magnitudes are wrong. Variants: Gaussian NB (continuous features, assumed normal), Multinomial NB (word counts — classic for text/spam), Bernoulli NB (binary features — word present/absent). Pros: extremely fast training AND prediction, works well with small data, handles high dimensions well, good baseline for text classification. Cons: independence assumption means it can't learn feature interactions, predicted probabilities are poorly calibrated (use Platt scaling to fix).",
why:"Classic interview question: 'why is it called naive and why does it work anyway?' Tests your understanding of probabilistic reasoning. Still a great quick baseline for text tasks.",
hot:"Know why 'naive' (independence assumption, almost never true). Know why it works anyway (probability rankings are correct even if magnitudes are off). Know Multinomial NB for text.",
guide:"Guide 2.13",prereqs:["probability","feat_eng"],
videos:[{t:"Naive Bayes",c:"StatQuest",u:"https://www.youtube.com/results?search_query=statquest+naive+bayes+clearly+explained"}],
code:"from sklearn.naive_bayes import MultinomialNB\nfrom sklearn.feature_extraction.text import CountVectorizer\n\ntexts = ['win free money now','important meeting tomorrow','click here win prize',\n         'project deadline friday','free gift limited time','quarterly report']\nlabels = [1, 0, 1, 0, 1, 0]  # 1=spam\n\nvec = CountVectorizer()\nX = vec.fit_transform(texts)\nnb = MultinomialNB().fit(X, labels)\ntest = vec.transform(['win a free gift'])\nprint('Spam probability:', nb.predict_proba(test))",
draw:"Draw the Naive Bayes calculation for a spam example: P(spam|'win','free') ∝ P(spam) × P('win'|spam) × P('free'|spam). Show the same for P(not spam|...). Compare and pick the higher.",
quiz:{q:"Why is Naive Bayes called 'naive,' and why does it still work well for text classification?",a:"'Naive' because it assumes all features (words) are independent given the class — P('win' and 'free' | spam) = P('win'|spam) × P('free'|spam). This is clearly false ('win' and 'free' co-occur more in spam). But it still works because: (1) the RANKING of class probabilities is often correct even if magnitudes are wrong, (2) in high dimensions, the independence assumption has less impact on classification accuracy, and (3) it's extremely fast with very little data, making it a strong baseline before trying complex models."},
followups:[],
actions:["Build a spam classifier with MultinomialNB in 10 lines","Compare Naive Bayes vs Logistic Regression on a text classification task","Check if NB probabilities are well-calibrated (plot calibration curve)"]},

{id:"rf",lv:5,cat:"coreml",name:"Random Forest",desc:"Bagging, bootstrap, random features, OOB score, feature importance",
w:"Build many decision trees (typically 100-500), each slightly different: each tree sees a random bootstrap sample of the data (~63% of rows, sampled with replacement) AND considers only a random subset of features at each split (typically √p for classification, p/3 for regression). For prediction: all trees vote (classification) or average (regression). Why it works: each tree overfits in its own unique way (different data, different features). When you average them, individual errors cancel out and only the real pattern remains. This reduces variance without increasing bias much. Why random features: if one feature is very strong, every tree would split on it first → all trees would be similar → averaging similar trees doesn't help. Random feature subsets decorrelate the trees, making the ensemble more diverse. Out-of-Bag (OOB) score: each tree doesn't see ~37% of data (not in its bootstrap sample). Use those unseen samples as a free validation set — OOB score approximates cross-validation accuracy without extra computation. Feature importance: measure how much each feature reduces impurity (Gini importance) across all trees. Or permutation importance: shuffle each feature and measure accuracy drop.",
why:"S-tier for tabular data. Robust, minimal tuning, hard to mess up. Your first serious model after baselines.",
hot:"Know: bagging (parallel, reduces variance). Know random features decorrelate trees. Know OOB score. Say 'reduces variance through decorrelated trees' to sound precise.",
guide:"Guide 2.10 — Random Forest",prereqs:["trees","bias_var","cross_val"],
videos:[{t:"Random Forest Part 1",c:"StatQuest",u:"https://www.youtube.com/results?search_query=statquest+random+forest+part+1"}],
code:"from sklearn.ensemble import RandomForestClassifier\n\nrf = RandomForestClassifier(n_estimators=100, max_depth=10, oob_score=True, random_state=42)\nrf.fit(X_train, y_train)\nprint(f'OOB score: {rf.oob_score_:.3f}')\nprint('Test score:', rf.score(X_test, y_test))\n\n# Feature importance\nimport pandas as pd\nfi = pd.Series(rf.feature_importances_, index=feature_names).sort_values(ascending=False)\nprint(fi.head(10))",
draw:"Draw 3 trees each seeing different data/features. Show them voting on a prediction — each might be wrong individually but the majority is correct. Label: each tree overfits differently → averaging cancels errors.",
quiz:{q:"Why does Random Forest use random feature subsets at each split?",a:"If one feature is very strong (e.g., 'is_fraud' for fraud detection), every tree would split on it first, making all trees nearly identical. Averaging identical trees doesn't help — you just get one tree's performance. Random feature subsets force trees to explore different features, making them diverse (decorrelated). When you average diverse trees, individual overfitting cancels out while the shared real pattern remains."},
followups:[{q:"What's the OOB score and why is it useful?",a:"Each tree is trained on ~63% of data (bootstrap sample). The remaining ~37% (out-of-bag) wasn't used for that tree. Use those unseen samples to evaluate that tree's predictions → average across all trees = OOB score. This approximates cross-validation accuracy for FREE — no separate holdout needed. Saves time and data."}],
actions:["Train RF with 10, 100, 500 trees — plot OOB score vs n_estimators","Compare RF feature importance vs permutation importance — do they agree?","Train RF vs single tree — compare accuracy AND stability (retrain 5 times, check variance)"]},

{id:"xgboost",lv:5,cat:"coreml",name:"XGBoost / gradient boosting",desc:"Sequential residual fitting, LightGBM, CatBoost, stacking, RF vs XGBoost",
w:"Boosting builds trees SEQUENTIALLY — each new tree fits the RESIDUALS (errors) of the previous ensemble. Tree 1 predicts → compute errors → Tree 2 learns to predict those errors → Tree 3 learns remaining errors → etc. Each tree added is scaled by a learning rate (shrinkage). XGBoost specifically: adds L1/L2 regularization on tree leaf weights (prevents overfitting), uses second-order gradients (Newton's method) for better optimization than plain gradient descent, handles missing values natively (learns which direction to split them), supports column subsampling (like RF's random features), parallel tree construction. LightGBM: faster than XGBoost via leaf-wise tree growth (grows the leaf with highest gain, not level-by-level), gradient-based one-side sampling (drops easy examples), exclusive feature bundling (combines sparse features). Better for large datasets. CatBoost: handles categorical features natively (no one-hot needed), uses ordered boosting to reduce prediction shift, less tuning needed. Stacking: train multiple diverse models (RF, SVM, logistic regression), use their predictions as features for a meta-model (often logistic regression). More powerful than simple averaging but more complex.",
why:"S-tier for tabular/structured data. Industry standard. Usually beats RF on accuracy. Wins most data science competitions. Knowing the RF vs XGBoost answer is a must.",
hot:"Know: boosting = sequential, reduces BIAS (unlike RF which reduces variance). Know residual fitting. Key answer: 'RF is robust with less tuning, XGBoost squeezes more accuracy but needs tuning and can overfit.'",
guide:"Guide 2.10 — Gradient Boosting, XGBoost, LightGBM, CatBoost, Stacking",prereqs:["trees","bias_var","grad_desc"],
videos:[{t:"Gradient Boost Part 1",c:"StatQuest",u:"https://www.youtube.com/results?search_query=statquest+gradient+boost"},{t:"XGBoost Part 1",c:"StatQuest",u:"https://www.youtube.com/results?search_query=statquest+xgboost+part+1"}],
code:"from xgboost import XGBClassifier\n\nxgb = XGBClassifier(n_estimators=100, max_depth=5, learning_rate=0.1,\n    reg_lambda=1.0, reg_alpha=0.1)  # L2 and L1!\nxgb.fit(X_train, y_train, eval_set=[(X_test,y_test)], verbose=10)\n# Watch the eval metric improve with each boosting round",
draw:"Draw 3 trees in sequence. Tree 1 makes predictions → compute residuals. Tree 2 fits THOSE residuals. Tree 3 fits remaining residuals. Show how ensemble prediction improves at each step. Compare to RF: trees in parallel, voting.",
quiz:{q:"What's the key difference between Random Forest and XGBoost?",a:"Random Forest: trees in PARALLEL (bagging), each on random data/features, average predictions → reduces VARIANCE. XGBoost: trees in SEQUENCE, each fitting RESIDUALS of previous ensemble → reduces BIAS. RF is robust with minimal tuning. XGBoost usually achieves higher accuracy but needs careful tuning (learning rate, max depth, n_estimators) and can overfit. RF = safety, XGBoost = performance."},
followups:[{q:"What makes XGBoost specifically better than plain gradient boosting?",a:"L1/L2 regularization on leaf weights (prevents overfitting), second-order gradient information (Newton's method — faster, more accurate optimization), native handling of missing values (learns optimal split direction), column subsampling, and highly optimized C++ implementation with parallel tree construction."}],
actions:["Train XGBoost and plot training/validation loss curves over boosting rounds","Tune learning_rate and n_estimators — show the inverse relationship","Compare XGBoost vs RF accuracy AND training time on the same dataset"]},

{id:"kmeans",lv:5,cat:"coreml",name:"K-Means clustering",desc:"Centroids, elbow method, silhouette score, k-means++, limitations",
w:"Unsupervised — no labels. Find groups in data. Algorithm: (1) Pick k random centroids, (2) Assign each point to nearest centroid, (3) Move each centroid to the mean of its assigned points, (4) Repeat until nothing changes. Choosing k: Elbow method — plot inertia (sum of squared distances to centroids) vs k, look for the 'elbow' where additional clusters stop helping much. Silhouette score: for each point, measures how well it fits its cluster vs the nearest other cluster. Range -1 to 1, higher = better. k-means++ initialization: instead of random starting centroids, choose them spread apart — first centroid random, subsequent chosen with probability proportional to distance from nearest existing centroid. Much better convergence. Limitations: assumes spherical clusters of similar size (crescent-shaped clusters fail), sensitive to outliers (they pull centroids), must specify k in advance, can get stuck in local optima (run multiple times with different seeds).",
why:"The most common clustering algorithm. Customer segmentation, EDA, preprocessing. Interviewers compare it with DBSCAN.",
hot:"Know elbow method and silhouette score. Mention k-means++ initialization. When asked K-Means vs DBSCAN: 'K-Means for spherical clusters when you know k, DBSCAN for arbitrary shapes and outlier detection.'",
guide:"Guide 2.14 — K-Means",prereqs:["feat_eng"],
videos:[{t:"K-Means Clustering",c:"StatQuest",u:"https://www.youtube.com/results?search_query=statquest+k+means+clustering"}],
code:"from sklearn.cluster import KMeans\nimport matplotlib.pyplot as plt\n\ninertias = []\nfor k in range(1,11):\n    km = KMeans(k, random_state=42, n_init=10).fit(X)\n    inertias.append(km.inertia_)\nplt.plot(range(1,11), inertias, 'o-')\nplt.xlabel('k'); plt.ylabel('Inertia'); plt.title('Elbow Method'); plt.show()",
draw:"Draw K-Means step by step: (1) random centroids, (2) assign points, (3) move centroids, (4) re-assign, (5) converged. Show the elbow chart. Draw K-Means failing on crescent-shaped data.",
quiz:{q:"How do you choose k in K-Means?",a:"Two main methods: (1) Elbow method: plot inertia vs k, look for the 'elbow' — the point where adding clusters gives diminishing returns. (2) Silhouette score: for each point, measures cohesion (distance to own cluster) vs separation (distance to nearest other cluster). Range -1 to 1, pick k with highest average silhouette. Also consider domain knowledge — if you're segmenting customers, the business might dictate 3-5 segments."},
followups:[],
actions:["Run K-Means with k=2,3,4,5 and plot elbow + silhouette","Show K-Means failing on non-spherical clusters (use make_moons dataset)","Compare K-Means vs DBSCAN on the same dataset"]},

{id:"dbscan_pca",lv:5,cat:"coreml",name:"DBSCAN, PCA, t-SNE, UMAP",desc:"Density clustering, outlier detection, dimensionality reduction, visualization",
w:"DBSCAN: density-based clustering. Two parameters: ε (epsilon, neighborhood radius) and minPts (minimum neighbors to form dense region). Core points: ≥ minPts neighbors within ε. Border points: within ε of a core point but not enough neighbors. Noise points: neither — these are outliers! Advantages over K-Means: finds arbitrary shapes, auto-determines k, identifies outliers. Disadvantages: struggles with varying densities, sensitive to ε/minPts. Hierarchical clustering: merge closest clusters bottom-up. Produces dendrogram — cut at any level. No k needed. PCA: finds new axes (principal components) that capture maximum variance. PC1 = direction of most variance. Each subsequent PC orthogonal to previous. Based on eigenvalues/eigenvectors of covariance matrix. MUST scale first (features on larger scales dominate variance). Explained variance ratio: 'first 3 PCs explain 95% of variance' → can reduce from 50 dims to 3 and lose only 5% info. Uses: visualization, noise reduction, preprocessing for KNN/SVM, multicollinearity fix. t-SNE: non-linear dimensionality reduction for VISUALIZATION ONLY. Preserves local structure. Axes are meaningless. Cluster sizes and distances don't mean what you think. Don't over-interpret. UMAP: like t-SNE but faster, preserves more global structure, and CAN apply to new data. Generally preferred.",
why:"Unsupervised techniques for exploration, preprocessing, and visualization. DBSCAN vs K-Means is a common interview comparison. PCA is fundamental for dimensionality reduction.",
hot:"Know K-Means vs DBSCAN tradeoffs. Know PCA requires scaling. Know t-SNE is ONLY for visualization — never for feature engineering. Mention explained variance ratio for PCA.",
guide:"Guide 2.14 — DBSCAN, Hierarchical, PCA, t-SNE, UMAP",prereqs:["kmeans","feat_eng"],
videos:[{t:"DBSCAN",c:"StatQuest",u:"https://www.youtube.com/results?search_query=statquest+dbscan"},{t:"PCA Main Ideas",c:"StatQuest",u:"https://www.youtube.com/results?search_query=statquest+pca+main+ideas"},{t:"t-SNE",c:"StatQuest",u:"https://www.youtube.com/results?search_query=statquest+tsne"}],
code:"from sklearn.cluster import DBSCAN\nfrom sklearn.decomposition import PCA\n\n# DBSCAN — finds arbitrary shapes + outliers\ndb = DBSCAN(eps=0.5, min_samples=5).fit(X)\nprint(f'Clusters: {len(set(db.labels_))-1}, Noise: {sum(db.labels_==-1)}')\n\n# PCA — MUST scale first!\nfrom sklearn.preprocessing import StandardScaler\nX_scaled = StandardScaler().fit_transform(X)\npca = PCA(n_components=2).fit(X_scaled)\nprint(f'Explained variance: {pca.explained_variance_ratio_}')",
draw:"Draw DBSCAN: core points (filled circles with enough neighbors), border points (open circles near core), noise points (X marks alone). Draw PCA: 2D scatter with PC1 arrow showing direction of max variance, PC2 perpendicular.",
quiz:{q:"When would you use DBSCAN instead of K-Means?",a:"When clusters have arbitrary shapes (crescents, rings — not spherical), when you don't know how many clusters exist (DBSCAN finds k automatically), when you need outlier detection (marks noise points), and when clusters have different sizes. K-Means assumes spherical clusters of similar size and requires k upfront. DBSCAN's downside: sensitive to ε and minPts, struggles with varying densities."},
followups:[{q:"Why must you scale features before PCA?",a:"PCA finds directions of maximum variance. If income is in millions and age in decades, income dominates all variance just from scale — PC1 would just track income. Scaling (StandardScaler) puts all features on equal footing so PCA captures genuine patterns, not scale artifacts."}],
actions:["Run DBSCAN on moon-shaped data — compare to K-Means","Do PCA on a 10-feature dataset, plot explained variance ratio, choose the right n_components","Visualize embeddings with t-SNE and UMAP side by side — compare"]},

{id:"anomaly",lv:5,cat:"coreml",name:"Anomaly detection & imbalanced data",desc:"Isolation Forest, SMOTE, class weights, threshold tuning, PR-AUC",
w:"Anomaly detection: Isolation Forest builds random trees that isolate individual points. Normal points are surrounded by similar data — many splits needed to isolate. Anomalies are different — isolated quickly (short path from root to leaf). Average path length across many trees = anomaly score. Short path = anomaly. One-Class SVM: learn a boundary around normal data, anything outside is suspicious. Autoencoder anomaly detection: train autoencoder on normal data, it learns to reconstruct normal patterns. Anomalies get high reconstruction error. Imbalanced data: when 99% is one class, accuracy is useless (predict all majority → 99%). Solutions: SMOTE (create synthetic minority examples by interpolating between existing minority points — pick two, create new point between them), class_weight='balanced' (penalize minority misclassification more), threshold tuning (move from 0.5 to e.g. 0.3 to catch more positives at cost of more false alarms), use F1/PR-AUC instead of accuracy, anomaly detection framing for extreme imbalance. Cost-sensitive learning: assign different misclassification costs per class.",
why:"Fraud detection, manufacturing defects, rare disease detection. If 99% is one class, everything changes — your metric, your model, your evaluation strategy.",
hot:"Know Isolation Forest intuition (short path = anomaly). Know SMOTE mechanics. Key insight: change your METRIC (F1, PR-AUC), not just your model.",
guide:"Guide 2.17 (Anomaly), 3.6 (Imbalanced Data)",prereqs:["kmeans","class_metrics"],
videos:[{t:"Isolation Forest",c:"StatQuest",u:"https://www.youtube.com/results?search_query=statquest+isolation+forest"}],
code:"from sklearn.ensemble import IsolationForest\nfrom imblearn.over_sampling import SMOTE\n\n# Isolation Forest\niso = IsolationForest(contamination=0.05).fit(X)\npreds = iso.predict(X)  # -1 = anomaly\nprint(f'Anomalies: {sum(preds==-1)}')\n\n# SMOTE\nX_res, y_res = SMOTE().fit_resample(X_train, y_train)\nprint(f'Before: {dict(zip(*np.unique(y_train,return_counts=True)))}')\nprint(f'After: {dict(zip(*np.unique(y_res,return_counts=True)))}')",
draw:"Draw Isolation Forest: a tree isolating a normal point (many splits, long path) vs an anomaly (1-2 splits, short path). Draw SMOTE: two minority points with a synthetic point between them.",
quiz:{q:"How does Isolation Forest detect anomalies?",a:"It builds random trees that isolate points by randomly picking features and split values. Normal points are surrounded by similar data, so they need many splits to isolate (long path). Anomalies are different from everything else, so they get isolated in just 1-2 splits (short path). Average path length across many trees = anomaly score. Short average path = likely anomaly. No assumptions about data distribution, works well in high dimensions."},
followups:[{q:"You have 10,000 normal transactions and 50 fraud cases. What's your full strategy?",a:"(1) Don't use accuracy (99.5% by always predicting normal). (2) Use PR-AUC or F1 as primary metric. (3) Start with class_weight='balanced' (simple, no fake data). (4) Try SMOTE for more diversity if needed. (5) Tune threshold from 0.5 to maximize business-relevant metric (higher recall for fraud). (6) Engineer velocity features (transactions/hour, amount deviation from user's average). (7) Consider Isolation Forest for pre-filtering."}],
actions:["Run Isolation Forest on data with known outliers — verify detection","Apply SMOTE and compare model F1 with/without it","Tune classification threshold to maximize F1 on imbalanced data"]},

// ═══ LEVEL 6: NEURAL NETWORKS ═══
{id:"neural_net",lv:6,cat:"dl",name:"Neural networks & backprop",desc:"Layers, neurons, activations, forward/backward pass, weight init, gradients",
w:"A neural network is layers of interconnected neurons. Each neuron: output = activation(w₁x₁ + w₂x₂ + ... + b). A single neuron with sigmoid IS logistic regression. Stack them into layers → learn complex patterns. Input layer: one neuron per feature. Hidden layers: where learning happens, each neuron connects to all in previous layer. Output: 1 neuron + sigmoid (binary), n neurons + softmax (multiclass), 1 neuron linear (regression). Why multiple layers: one layer = linear boundaries. Two = curves. Three = complex shapes. Layer 1 learns edges, layer 2 combines into shapes, layer 3 into objects. Activation functions: without them, stacking layers collapses to one linear transformation. They add non-linearity. Sigmoid (0-1, vanishing gradients at extremes), Tanh (-1 to 1, zero-centered, still vanishes), ReLU (max(0,x), default for hidden layers, fast, doesn't saturate for positive — but 'dying' problem if input always negative → gradient always 0), Leaky ReLU (fixes dying: 0.01x for negative), GELU (smooth ReLU, used in BERT/GPT), Softmax (vector → probabilities summing to 1). Backpropagation: forward pass (data through network → prediction), compute loss, backward pass (chain rule through each layer → gradient for every weight), update weights (w -= lr × gradient). Epoch = full pass through data. Batch size = samples per update (32-128 typical). Weight initialization: all zeros → symmetry problem (all neurons identical, can't learn different features). Xavier/Glorot for sigmoid/tanh (variance = 2/(fan_in+fan_out)). He for ReLU (variance = 2/fan_in, accounts for ReLU killing half). Vanishing gradients: chain rule multiplies gradients < 1 through layers → early layers barely learn. Caused by sigmoid/tanh. Fixes: ReLU, batch norm, skip connections, LSTM. Exploding: gradients > 1 → weights blow to NaN. Fix: gradient clipping.",
why:"Foundation of ALL deep learning. CNNs, RNNs, Transformers are specialized neural networks. Understanding this is non-negotiable.",
hot:"Know WHY activations exist (non-linearity). ReLU vs sigmoid (vanishing gradients). He init for ReLU. Chain rule IS backprop. Know batch size tradeoff.",
guide:"Guide 4.1 — complete section",prereqs:["grad_desc","loss_fn","log_reg"],
videos:[{t:"Neural Networks (playlist)",c:"3Blue1Brown",u:"https://www.youtube.com/results?search_query=3blue1brown+neural+networks+playlist"},{t:"Backpropagation calculus",c:"3Blue1Brown",u:"https://www.youtube.com/results?search_query=3blue1brown+backpropagation"},{t:"ReLU",c:"StatQuest",u:"https://www.youtube.com/results?search_query=statquest+relu"}],
code:"import numpy as np\n\ndef relu(x): return np.maximum(0, x)\ndef sigmoid(x): return 1/(1+np.exp(-x))\n\n# Forward pass: 2 inputs → 3 hidden → 1 output\nnp.random.seed(42)\nW1 = np.random.randn(2,3) * np.sqrt(2/2)  # He init\nb1 = np.zeros(3)\nW2 = np.random.randn(3,1) * np.sqrt(2/3)\nb2 = np.zeros(1)\n\nx = np.array([0.5, 0.8])\nhidden = relu(x @ W1 + b1)\noutput = sigmoid(hidden @ W2 + b2)\nprint(f'Input: {x} → Hidden: {hidden.round(3)} → Output: {output.round(3)}')",
draw:"Draw a neural network: 2 input → 3 hidden → 1 output. Label weights on connections. Show forward pass with actual numbers. Show backward pass with gradient arrows. Draw ReLU, sigmoid, softmax activation function shapes.",
quiz:{q:"Why do neural networks need activation functions?",a:"Without activations, each layer is a linear transformation (multiply by weights + add bias). Stacking ANY number of linear transformations gives you... another linear transformation. 100 layers collapse into 1. Activations add non-linearity — 'bends' in the mapping — which lets neural networks learn curves, edges, complex patterns. ReLU is the default because it doesn't saturate for positive inputs (no vanishing gradients) and is computationally fast (just max(0,x))."},
followups:[{q:"What's the vanishing gradient problem?",a:"During backprop, gradients are multiplied through each layer via the chain rule. Sigmoid/tanh derivatives are always < 1 (max ~0.25 for sigmoid). Through 10 layers: 0.25¹⁰ ≈ 0.000001. Early layers get essentially zero gradients and never learn. This is why deep networks couldn't train until ReLU (gradient = 1 for positive inputs), batch normalization, and skip connections (ResNet) were invented."},{q:"Why does weight initialization matter?",a:"All zeros: every neuron computes the same thing, gets the same gradient, updates identically — can never learn different features (symmetry breaking). Too large: activations explode. Too small: activations vanish. He initialization is calibrated for ReLU — it accounts for the fact that ReLU kills half the activations, so you need larger initial weights to compensate."}],
actions:["Watch ALL 4 of 3Blue1Brown's neural network videos","Build a 2-layer network from scratch in NumPy","Train a simple PyTorch network, print gradients at each layer"]},

{id:"nn_reg",lv:6,cat:"dl",name:"NN regularization",desc:"Dropout, batch norm, layer norm, early stopping",
w:"Dropout: during training, randomly zero out neurons with probability p (typically 0.5). Forces network to develop redundant representations — can't rely on any single neuron. Like studying with random pages torn out. At inference: all neurons ON, outputs scaled by (1-p). Inverted dropout scales during training instead. Batch Normalization: normalize each feature's activations across the current batch (subtract batch mean, divide by batch std), then apply learned scale (γ) and shift (β). Benefits: faster convergence, allows higher learning rates, slight regularization. Applied between linear layer and activation. Layer Normalization: normalize across features for EACH EXAMPLE independently (not across the batch). Used in Transformers because it doesn't depend on batch size and works with variable-length sequences. Batch norm vs layer norm: batch norm normalizes each feature across the batch (good for CNNs where batch statistics are meaningful). Layer norm normalizes all features within one example (good for Transformers/RNNs where sequences have variable length). Early Stopping: monitor validation loss during training. When it stops decreasing (or starts increasing) for N epochs (patience), stop and restore weights from the best epoch. Prevents overfitting even if you set too many epochs.",
why:"Neural nets overfit easily. These techniques are standard in EVERY architecture. Batch norm vs layer norm is a common interview question.",
hot:"Know dropout is OFF at inference. Know batch norm vs layer norm (batch=CNNs, layer=Transformers). Know early stopping uses patience parameter.",
guide:"Guide 4.1 — regularization + gradient subsections",prereqs:["neural_net","regularization"],
videos:[{t:"Dropout",c:"StatQuest",u:"https://www.youtube.com/results?search_query=statquest+dropout"},{t:"Batch Normalization",c:"StatQuest",u:"https://www.youtube.com/results?search_query=statquest+batch+normalization"}],
code:"import torch.nn as nn\n\nclass Net(nn.Module):\n    def __init__(self):\n        super().__init__()\n        self.fc1 = nn.Linear(10, 64)\n        self.bn1 = nn.BatchNorm1d(64)\n        self.drop = nn.Dropout(0.5)\n        self.fc2 = nn.Linear(64, 1)\n    def forward(self, x):\n        x = torch.relu(self.bn1(self.fc1(x)))\n        x = self.drop(x)  # only during training!\n        return torch.sigmoid(self.fc2(x))\n\nmodel = Net()\nmodel.train()  # dropout ON, BN uses batch stats\nmodel.eval()   # dropout OFF, BN uses running stats",
draw:"Draw dropout: 6 neurons with 3 randomly crossed out. Show different neurons dropped each batch. Draw batch norm: values being shifted to mean=0, std=1, then scaled by learned γ and β.",
quiz:{q:"Why does the Transformer use layer norm instead of batch norm?",a:"Batch norm normalizes across the batch for each feature — needs a consistent batch to compute meaningful statistics. Transformers process variable-length sequences, and computing statistics across sequences of different lengths doesn't make sense (position 5 in a 10-word sentence is different from position 5 in a 100-word sentence). Layer norm normalizes across all features within each individual example, independent of batch composition and sequence length."},
followups:[{q:"How does dropout work at training vs inference?",a:"Training: randomly zero out each neuron with probability p (e.g., 0.5). Forces redundant representations. Inference: ALL neurons active, but outputs multiplied by (1-p) to compensate (more neurons active = higher activation values). With inverted dropout, you scale during training instead (divide by 1-p), so inference requires no changes."}],
actions:["Train same network with/without dropout — compare overfitting","Add early stopping and plot train/val loss curves","Swap batch norm and layer norm in a model — compare on sequence vs image data"]},

// ═══ LEVEL 7: ARCHITECTURES ═══
{id:"cnn",lv:7,cat:"dl",name:"CNN",desc:"Kernels step by step, stride, padding, pooling, ResNet, feature hierarchy",
w:"For image/spatial data. The problem: 256×256×3 image = ~200K features. Fully connected layers → billions of parameters → overfitting. Key insight: a cat's ear looks the same whether it's top-left or bottom-right — learn the pattern once, apply everywhere (weight sharing). KERNELS: a small learnable filter (3×3). Slides across the image. At each position: element-wise multiply each kernel weight by the pixel underneath, sum the 9 products → one number. Slide right, repeat. Result: a feature map highlighting where that pattern exists. The network LEARNS kernel weights via backprop. Early layers learn edges/gradients. Deeper layers combine: edges → textures → parts (eyes, wheels) → objects. Multiple kernels per layer (64 kernels → 64 feature maps). Stride: pixels per step (stride 2 → output half size). Padding: border of zeros (same padding preserves dimensions). Pooling: downsamples. Max pooling (max in each 2×2 window, keeps strongest signal). Global average pooling (average entire feature map → one number, used instead of dense layers at end). 1×1 convolutions: change channel depth without affecting spatial size. Receptive field: how much of original image affects one neuron — grows with depth. Architecture pattern: [Conv → BN → ReLU → Pool] × N → Global Avg Pool → Dense → Output. Famous: AlexNet (2012, started DL revolution, ReLU + GPUs), VGG (deep, all 3×3), ResNet (2015, skip connections: output = F(x) + x, solves vanishing gradients for 100+ layers), Inception (parallel multi-scale filters).",
why:"THIS IS WHERE YOU WENT BLANK in your mock. Kernels were specifically asked. Still dominant for computer vision. Understanding CNNs shows you understand how neural networks learn spatial features.",
hot:"Explain kernel convolution STEP BY STEP (place 3×3 stamp, multiply, sum, slide). Know stride, padding, max pooling. Know ResNet skip connections solve vanishing gradients. Know receptive field grows with depth.",
guide:"Guide 4.2 — CNNs, complete section",prereqs:["neural_net","nn_reg"],
videos:[{t:"CNNs explained",c:"StatQuest",u:"https://www.youtube.com/results?search_query=statquest+convolutional+neural+networks"},{t:"CNN Visualizations",c:"3Blue1Brown",u:"https://www.youtube.com/results?search_query=3blue1brown+convolution"}],
code:"import numpy as np\n\n# Manual convolution — THIS is what a CNN does\nimage = np.array([[1,2,3,0],[4,5,6,1],[7,8,9,2],[0,1,2,3]])\nkernel = np.array([[-1,-1,-1],[0,0,0],[1,1,1]])  # horizontal edge\n\nfor i in range(2):\n    for j in range(2):\n        patch = image[i:i+3, j:j+3]\n        result = np.sum(patch * kernel)\n        print(f'Position ({i},{j}): {result}')",
draw:"Draw a 5×5 grid (image). Overlay a 3×3 kernel. Show element-wise multiply and sum giving ONE number. Show the kernel sliding right one step. Draw the resulting 3×3 feature map. Draw the feature hierarchy: edges → textures → parts → objects.",
quiz:{q:"What is a kernel (filter) in a CNN and how does it work?",a:"A kernel is a small matrix of learnable weights (e.g., 3×3). It slides across the input image: at each position, multiply each kernel weight by the pixel underneath, sum all 9 products to get one number. This produces a feature map highlighting where a specific pattern exists. The network learns kernel weights through backpropagation. Early layers learn simple features (edges, gradients). Deeper layers combine these into complex features (textures → parts → whole objects). Multiple kernels per layer detect different patterns — 64 kernels produce 64 feature maps."},
followups:[{q:"What are skip connections and why do they matter?",a:"Skip connections (ResNet): output = F(x) + x. Add the input to the layer's output. If the layer has nothing useful to learn, it can learn F(x)=0 and just pass the input through. This gives gradients a direct path backward through the network, solving vanishing gradients for very deep networks (100+ layers). Without them, networks deeper than ~20 layers couldn't train effectively."}],
actions:["Implement 2D convolution from scratch in NumPy","Apply hand-crafted kernels (edge, blur, sharpen) to an image and see results","Visualize learned filters from the first layer of a pretrained VGG model"]},

{id:"rnn_lstm",lv:7,cat:"dl",name:"RNN → LSTM → GRU",desc:"Sequential processing, vanishing gradients, gates, cell state, seq2seq",
w:"RNNs: for sequential data (text, time series). Process one element at a time, maintaining a hidden state: h_t = activation(W_h·h_{t-1} + W_x·x_t + b). Same weights at every step. Problem: vanishing gradients during backprop through time — gradients shrink exponentially, can't learn long-range dependencies. 'The cat, which sat on the mat next to the dog, WAS sleeping' — by 'WAS,' memory of 'cat' has faded. LSTM: fixes this with a gated architecture. Cell state: a highway where info flows with minimal modification (the key innovation). Forget gate: f_t = sigmoid(W·[h_{t-1}, x_t]) — decides what to drop from cell state. Input gate: i_t = sigmoid(W·[...]) — decides what to add. Output gate: o_t = sigmoid(W·[...]) — decides what to output as hidden state. Cell update: c_t = f_t * c_{t-1} + i_t * tanh(W·[...]). Gradients flow through cell state highway without being multiplied by weight matrices at each step → much longer range. GRU: simplified LSTM, 2 gates (reset, update) instead of 3. Fewer parameters, often similar performance. Bidirectional: two RNNs (forward + backward), concatenate. Each position sees past AND future context. Seq2seq: encoder RNN reads input → final hidden state ('thought vector') → decoder RNN generates output token by token. Teacher forcing: feed correct previous token during training (faster but train/test mismatch). The big limitation: squeezing entire input into one vector loses info → motivated attention.",
why:"LSTM is in your stock dashboard. Historical importance — directly led to attention and Transformers. Still used for time series forecasting.",
hot:"Know the 3 gates (forget/erase, input/write, output/read) and cell state (highway). Know vanishing gradients is WHY LSTM exists. Say 'Transformers replaced LSTMs for NLP because of parallelization and better long-range dependencies.'",
guide:"Guide 4.3 — RNNs, complete",prereqs:["neural_net","nn_reg"],
videos:[{t:"LSTM",c:"StatQuest",u:"https://www.youtube.com/results?search_query=statquest+lstm"},{t:"Illustrated Guide to LSTMs",c:"",u:"https://www.youtube.com/results?search_query=illustrated+guide+lstm"}],
code:"import torch, torch.nn as nn\n\nlstm = nn.LSTM(input_size=10, hidden_size=20, batch_first=True)\nx = torch.randn(1, 5, 10)  # batch=1, seq=5, features=10\noutput, (h_n, c_n) = lstm(x)\nprint(f'Output: {output.shape}')  # (1,5,20) hidden at each step\nprint(f'Hidden: {h_n.shape}')   # (1,1,20) final hidden\nprint(f'Cell: {c_n.shape}')     # (1,1,20) the memory highway",
draw:"Draw the LSTM cell: cell state highway on top, forget gate (× erase), input gate (+ write), output gate (read). Show info flowing through. Draw the unrolled RNN: same cell repeated for each time step with hidden state passing between them.",
quiz:{q:"What problem does LSTM solve that vanilla RNNs can't?",a:"Vanilla RNNs suffer from vanishing gradients: during backprop through many time steps, gradients are multiplied through the same weight matrix repeatedly. Values < 1 shrink exponentially → early time steps get near-zero gradients → network can't learn long-range dependencies. LSTM solves this with the cell state — a highway where information flows with minimal modification (additive updates, not multiplicative). The three gates (forget, input, output) learn what to remember, add, and output. Gradients can flow through the cell state highway without being degraded at each step."},
followups:[{q:"Why did Transformers replace LSTMs for NLP?",a:"Two reasons: (1) LSTMs process sequentially (word by word) — can't parallelize on GPUs. Transformers process ALL positions simultaneously. (2) Even LSTMs degrade over very long sequences. Transformer attention connects any two positions directly, regardless of distance. For time series, LSTMs are still competitive because sequence lengths are shorter."}],
actions:["Watch the Illustrated Guide to LSTMs video and draw the cell from memory","Train LSTM on a simple sequence prediction task","Compare LSTM vs GRU on the same task — measure accuracy and training speed"]},

{id:"embeddings",lv:7,cat:"dl",name:"Embeddings & tokenization",desc:"BPE, WordPiece, Word2Vec, contextual, cosine similarity, vector databases, ANN",
w:"Tokenization: converting text to numbers. Can't use whole words (vocabulary too large, can't handle new words) or characters (too granular, must learn spelling before meaning). Subword tokenization: break into meaningful pieces. 'unhappiness' → ['un','happi','ness']. BPE (GPT): start with characters, iteratively merge most frequent pair. WordPiece (BERT): merge based on likelihood. SentencePiece: language-agnostic, raw bytes. Vocabulary: 30K-100K tokens. Special tokens: [CLS] (sequence representation for BERT classification), [SEP] (sentence boundary), [PAD] (padding for uniform length), [MASK] (BERT MLM training). Embeddings: Token IDs → embedding matrix lookup → dense vectors (768-dim for BERT). The matrix IS learnable parameters. Similar words end up close: 'king'-'man'+'woman' ≈ 'queen.' Word2Vec/GloVe: static embeddings (one vector per word regardless of context — 'bank' same vector for river/money). BERT/GPT: contextual embeddings (vector for 'bank' CHANGES based on surrounding words). Full pipeline: text → tokenize → token IDs → embedding lookup → + positional encoding → Transformer → contextual embeddings. Vector databases (pgvector, Pinecone, FAISS): optimized for storing and searching embedding vectors. Semantic search: embed documents → store → embed query → find nearest vectors via cosine similarity → return matching documents. ANN (approximate nearest neighbor): exact search is O(n). HNSW, IVF make it sub-linear by trading tiny accuracy loss for massive speed gain. YOUR INFERA PROJECT does exactly this.",
why:"How ALL text becomes numbers for neural networks. Understanding the full pipeline is essential. Your Infera project IS a vector search system using FinBERT embeddings in pgvector.",
hot:"Know static vs contextual embeddings. Know cosine similarity for text (direction > magnitude). Know the full pipeline. Connect to Infera: 'FinBERT embeddings → pgvector → cosine retrieval.'",
guide:"Guide 4.8 (Tokenization), 4.9 (Embeddings)",prereqs:["neural_net","loss_fn"],
videos:[{t:"Word2Vec",c:"StatQuest",u:"https://www.youtube.com/results?search_query=statquest+word2vec"},{t:"Word Embeddings",c:"StatQuest",u:"https://www.youtube.com/results?search_query=statquest+word+embedding+nlp"}],
code:"from transformers import AutoTokenizer\n\ntok = AutoTokenizer.from_pretrained('bert-base-uncased')\ntokens = tok.tokenize('unhappiness is overwhelming')\nprint('Tokens:', tokens)  # ['un','##happiness','is','over','##whelm','##ing']\nids = tok.encode('unhappiness is overwhelming')\nprint('IDs:', ids)\n\n# Cosine similarity between sentences\nfrom sklearn.metrics.pairwise import cosine_similarity\n# (after getting embeddings from model)\n# print(cosine_similarity(emb1, emb2))",
draw:"Draw the full pipeline: 'The cat sat' → tokenizer → [101, 2996, 4937, 2938, 102] → embedding matrix → 768-dim vectors → + positional encoding → Transformer. Draw Word2Vec vs BERT: same word 'bank' gets ONE vector (Word2Vec) vs DIFFERENT vectors based on context (BERT).",
quiz:{q:"What's the difference between static (Word2Vec) and contextual (BERT) embeddings?",a:"Word2Vec: each word gets ONE fixed vector regardless of context. 'Bank' has the same vector whether it means a river bank or a financial bank. This is a major limitation — it can't handle polysemy (words with multiple meanings). BERT: each word's vector CHANGES based on surrounding words. 'Bank' in 'river bank' gets a different vector than 'bank account.' The Transformer layers process the entire sequence and produce context-dependent representations. This is why BERT understands language much better."},
followups:[{q:"Why is cosine similarity used for text embeddings instead of Euclidean distance?",a:"Documents vary in length. A long article about cats has a larger embedding magnitude than a tweet about cats, but they're equally 'about cats.' Cosine measures the ANGLE between vectors (direction = semantic meaning), ignoring magnitude (length). Two documents pointing the same direction are similar regardless of length. This is exactly what Infera does — cosine similarity between FinBERT embeddings in pgvector."},{q:"How does your Infera project use embeddings?",a:"FinBERT converts 10-K filing sections into 768-dimensional vectors that capture financial meaning. These are stored in PostgreSQL via pgvector. When a user queries about risk factors, their query is embedded with the same FinBERT model. Cosine similarity search in pgvector finds the closest document sections — semantic search by meaning, not keywords."}],
actions:["Tokenize 5 sentences and examine the subword splits","Compute cosine similarity between 3 sentence pairs using sentence-transformers","Visualize word embeddings in 2D using PCA — check if similar words cluster"]},

// ═══ LEVEL 8: TRANSFORMERS ═══
{id:"attention",lv:8,cat:"modern",name:"Attention mechanism",desc:"Self-attention, cross-attention, Q/K/V, multi-head, scaling",
w:"The problem: seq2seq compresses entire input into one vector → info loss for long sequences. Attention lets the model look at ALL input positions and decide which are relevant. Self-attention: each token attends to all OTHER tokens in SAME sequence. Cross-attention: tokens in one sequence attend to a DIFFERENT sequence (decoder → encoder). How it works: for each token, compute three vectors via learned weight matrices. Query (Q) = 'what am I looking for?' Key (K) = 'what do I contain?' Value (V) = 'what info do I carry?' Like a library: Q = your search question, K = book titles, V = book contents. Attention scores: dot(Q, K) for each pair → high when vectors point same direction (relevant). Scale by √d_k → prevents large dot products from pushing softmax to extreme values (where gradients vanish). Softmax → attention weights (sum to 1). Multiply each V by its weight, sum → output is a weighted blend of all values, mostly from relevant positions. Formula: Attention(Q,K,V) = softmax(QKᵀ/√d)·V. Example: 'The animal didn't cross the street because IT was tired.' Processing 'IT': Q('IT') has high dot product with K('animal') → 'IT' attends strongly to 'animal' → output for 'IT' is mostly blended with 'animal's value → model understands 'IT' refers to 'animal.' Multi-head attention: instead of one Q,K,V set, use 8-12 parallel 'heads' with different weight matrices. Each learns different relationships: Head 1 = syntax (subject-verb), Head 2 = semantics (pronoun-antecedent), Head 3 = proximity. Concatenate all heads, pass through a linear layer.",
why:"THE breakthrough enabling Transformers. Without attention, modern AI doesn't exist. Understanding Q/K/V is the single most important technical concept for your interviews.",
hot:"Use the 'IT' example with 'animal.' Library analogy: Q=search, K=titles, V=contents. Know WHY scale by √d (prevent softmax saturation). Know self vs cross attention. Know multi-head learns different relationship types.",
guide:"Guide 4.4 (Attention), 4.5 (Self-Attention detail)",prereqs:["rnn_lstm","embeddings"],
videos:[{t:"Attention in Transformers",c:"3Blue1Brown",u:"https://www.youtube.com/results?search_query=3blue1brown+attention+transformers"},{t:"Self-Attention",c:"StatQuest",u:"https://www.youtube.com/results?search_query=statquest+self+attention+transformers"},{t:"Illustrated Transformer",c:"Jay Alammar",u:"https://www.youtube.com/results?search_query=jay+alammar+illustrated+transformer"}],
code:"import torch\nimport torch.nn.functional as F\n\nd_k = 8; seq_len = 4\nQ = torch.randn(seq_len, d_k)\nK = torch.randn(seq_len, d_k)\nV = torch.randn(seq_len, d_k)\n\nscores = Q @ K.T / (d_k ** 0.5)  # scale!\nweights = F.softmax(scores, dim=-1)\nprint('Attention weights:\\n', weights.round(decimals=3))\noutput = weights @ V",
draw:"Draw 4 words. For 'it', draw arrows to all words — thick to 'animal' (high attention), thin to 'street' (low). Label Q, K, V. Show the attention weight matrix as a heatmap.",
quiz:{q:"Explain self-attention using 'The animal didn't cross the street because it was tired.'",a:"Each word computes Q, K, V via learned weight matrices. For 'it': its Query asks 'what do I refer to?' Every word's Key represents 'what I contain.' Dot product Q('it')·K('animal') is high (relevant content), Q('it')·K('street') is low. After scaling by √d and softmax, attention weights are ~0.6 for 'animal,' ~0.05 for 'street,' etc. Output for 'it' = weighted sum of all Values, mostly 'animal's' info → model understands the reference. Multi-head: different heads capture syntax, semantics, proximity simultaneously."},
followups:[{q:"Why scale by √d_k?",a:"Without scaling, dot products grow proportionally to d_k (sum of d_k element-wise products). Large values push softmax into extreme regions where output is nearly one-hot and gradients are near zero. Dividing by √d_k keeps values in a range where softmax produces useful, non-peaked distributions with meaningful gradients."},{q:"Self-attention vs cross-attention?",a:"Self: Q, K, V all from SAME sequence. Each word looks at all other words in its own sequence. Used within encoder and within decoder. Cross: Q from one sequence (decoder), K and V from DIFFERENT sequence (encoder output). Decoder 'looks at' encoder representations to generate relevant output."}],
actions:["Watch 3Blue1Brown's attention video","Implement scaled dot-product attention from scratch","Visualize attention weights for a real sentence using bertviz"]},

{id:"transformer",lv:8,cat:"modern",name:"Transformer architecture",desc:"Full architecture, positional encoding, masking, KV cache, decoding strategies",
w:"THE most important architecture. Encoder: [multi-head self-attention → add+layernorm → FFN → add+layernorm] × N. Decoder: [MASKED self-attention → add+LN → cross-attention (over encoder) → add+LN → FFN → add+LN] × N. Why masked in decoder: when generating word 5, can't see words 6,7,8 (would be cheating). Mask sets future positions to -∞ before softmax → attention weights become 0. Positional encoding: Transformers process all positions simultaneously → no inherent order. 'Dog bites man' = 'man bites dog' without position info. Sinusoidal (fixed, original paper), learned embeddings (BERT, GPT), RoPE (rotates Q,K vectors, encodes relative position, used in modern LLMs). Residual connections: output = layer(x) + x. If layer has nothing to add, learns F(x)=0. Allows gradients direct backward path. Feed-forward network: two dense layers with ReLU, applied per position independently. This is where most 'knowledge' is stored — largest part of the model. Encoder-only = BERT (bidirectional, understanding). Decoder-only = GPT/Claude (autoregressive, generation). Encoder-decoder = T5/BART (translation, summarization). Context window: attention is O(n²) — every token attends to every other. Double length → 4× compute and memory. KV Cache: during generation, cache K,V for previous tokens. New token only computes Q,K,V for itself, looks up cached K,V → generation is O(n) per token instead of O(n²). Decoding: greedy (always pick highest prob — deterministic, boring), beam search (track top-k sequences, more thorough), temperature (controls randomness: 0=deterministic, >1=more random), top-k (only consider k most likely tokens), top-p/nucleus (consider smallest set of tokens summing to probability p — adapts to confidence).",
why:"GPT, BERT, Claude, Gemini — ALL Transformers. Understanding this architecture = understanding modern AI. The make-or-break topic.",
hot:"Must explain: Q/K/V attention, why it replaced RNNs (parallel + long-range), positional encoding (WHY needed), masked attention (can't see future), KV cache (WHY inference is fast), context window (O(n²)).",
guide:"Guide 4.5 — complete section",prereqs:["attention","nn_reg"],
videos:[{t:"Transformer Visually Explained",c:"3Blue1Brown",u:"https://www.youtube.com/results?search_query=3blue1brown+transformers"},{t:"Attention Is All You Need walkthrough",c:"Yannic Kilcher",u:"https://www.youtube.com/results?search_query=yannic+kilcher+attention+is+all+you+need"}],
code:"import torch.nn as nn\n\nencoder_layer = nn.TransformerEncoderLayer(\n    d_model=64, nhead=4, dim_feedforward=256,\n    dropout=0.1, batch_first=True, norm_first=True)\nx = torch.randn(1, 10, 64)\nout = encoder_layer(x)\nprint(f'In: {x.shape} → Out: {out.shape}')  # same!\n\nmask = nn.Transformer.generate_square_subsequent_mask(10)\nprint('Causal mask (first 5x5):\\n', mask[:5,:5].round())",
draw:"Draw full encoder: input → multi-head attention → add+norm → FFN → add+norm. Draw decoder with masked attention and cross-attention. Draw causal mask as lower-triangular matrix. Draw positional encoding being added to embeddings.",
quiz:{q:"Why do Transformers need positional encoding?",a:"Transformers process all tokens simultaneously — unlike RNNs which go one by one. Without position info, the model can't distinguish 'dog bites man' from 'man bites dog.' Positional encoding adds a unique signal to each token's embedding indicating its position. Original paper used sinusoidal functions (fixed patterns). Modern models use learned embeddings or RoPE (rotates Q,K vectors to naturally encode relative position)."},
followups:[{q:"What is KV cache?",a:"During autoregressive generation, each new token attends to ALL previous tokens. Without caching, you'd recompute K,V for all previous tokens at every step (O(n²) total). KV cache stores previously computed K,V vectors. For each new token, only compute Q,K,V for itself, look up cached K,V for all previous → O(n) per token."},{q:"Why is attention O(n²)?",a:"Every token computes attention with every other token: n × n = n² attention scores. The attention matrix is n×n. Double sequence length → 4× compute and memory. This limits context windows. Techniques like sparse attention, Flash Attention reduce the constant but the fundamental scaling remains quadratic."}],
actions:["Read Jay Alammar's Illustrated Transformer blog","Implement causal mask and verify it blocks future positions","Generate text from GPT-2 with temperatures 0.1, 0.7, 1.5 — compare"]},
