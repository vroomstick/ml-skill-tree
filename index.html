<script>
const CC={foundation:"#f85149",coreml:"#f0883e",dl:"#a371f7",modern:"#58a6ff",applied:"#3fb950"};
const CL={foundation:"Foundation",coreml:"Core ML",dl:"Deep learning",modern:"Modern AI",applied:"Applied"};
const LT=["Foundations","Probability & statistics","Data skills","ML theory","Classical models","Ensembles & unsupervised","Neural network foundations","Specialized architectures","Attention & Transformers","Modern AI & LLMs","Applied & production"];
const SRI=[24,72,168];

// ══════════════════════════════════════════════════════
// FULL NODE DATA — 62 NODES, FULL GUIDE DEPTH
// ══════════════════════════════════════════════════════
const N=[

// ═══ LEVEL 0: FOUNDATIONS ═══
{id:"python",lv:0,cat:"foundation",name:"Python & data stack",desc:"Data types, functions, pandas, numpy, matplotlib",
w:"The programming language for ALL of ML. You need fluency in: data types (int, float, str, list, dict, set, tuple), control flow (if/else, for, while), functions (args, kwargs, lambda, decorators), classes, list comprehensions, generators, file I/O. Plus the data stack: NumPy for numerical arrays and vectorized operations (element-wise math without for-loops, 10-100x faster). Pandas for DataFrames — df.head(), df.describe(), df.info(), df.isnull().sum(), df.groupby(), pd.merge(), df.pivot_table(), df.sort_values(), df.apply(). Matplotlib for basic plotting. String operations: df['col'].str.lower(), .str.contains(). Date operations: pd.to_datetime(), .dt.year, .dt.dayofweek. Window operations: .rolling(), .cumsum(), .pct_change(), .rank().",
why:"Every ML library is Python. Every interview assumes fluency. Every code exercise will be Python.",
hot:"Don't just know syntax — show pythonic patterns. Use list comprehensions, vectorized operations, .apply(). Know pandas groupby, merge (left/inner/outer), and window operations cold. Know the difference between .loc[] and .iloc[].",
guide:"Guide Part 8.2 — Python/Pandas",prereqs:[],
videos:[{t:"Python for Data Science Full Course",c:"freeCodeCamp",u:"https://www.youtube.com/results?search_query=python+data+science+full+course+freecodecamp"},{t:"Pandas in 20 Minutes",c:"Wes McKinney",u:"https://www.youtube.com/results?search_query=pandas+tutorial+20+minutes+beginner"}],
code:"import pandas as pd\nimport numpy as np\n\ndf = pd.DataFrame({'name':['Alice','Bob','Carol','Dave'],\n  'age':[25,30,35,28], 'salary':[50000,60000,80000,55000]})\nprint(df.describe())\nprint(df.groupby(df['age']>28)['salary'].mean())\nprint(df[df['salary']>55000].sort_values('salary',ascending=False))\n\n# Window operations\ndf['rolling_avg'] = df['salary'].rolling(2).mean()\ndf['rank'] = df['salary'].rank(ascending=False)",
draw:"Draw a pandas DataFrame as a table. Label: index, columns, dtypes. Show what .groupby() does visually — split the table into groups, apply a function, combine results.",
quiz:{q:"What's the difference between a Python list and a NumPy array? When would you use each?",a:"Lists hold mixed types, are flexible but slow for math. NumPy arrays hold one type, support vectorized operations (element-wise math without loops), and are 10-100x faster for numerical work. Use lists for general collections, NumPy for any numerical computation. NumPy also supports broadcasting, slicing, and linear algebra operations that lists can't do."},
followups:[{q:"What does df.groupby('city')['salary'].transform('mean') do vs .agg('mean')?",a:"agg() collapses groups into one row each (smaller df). transform() computes the result but broadcasts back to the original shape — every row gets its group's mean as a new column. Use transform when you want group-level stats alongside original rows."},{q:"Why use vectorized operations instead of for-loops in pandas?",a:"Pandas/NumPy operations run in optimized C under the hood. A for-loop over 1M rows might take 30 seconds; a vectorized operation takes 0.01 seconds. Always prefer df['col'] * 2 over for i in range(len(df))."}],
actions:["Open Jupyter, load a CSV, and do full EDA with pandas","Do 10 pandas exercises on kaggle.com/learn/pandas","Write a function that takes a df and returns summary stats for every numeric column"]},

{id:"math",lv:0,cat:"foundation",name:"Math intuition",desc:"Vectors, matrices, dot products, derivatives, chain rule",
w:"Linear algebra: Vectors are lists of numbers representing points in space. Matrices are grids of numbers representing transformations. Dot product measures similarity between vectors — it's high when vectors point the same direction (this IS attention in Transformers). Matrix multiplication: each output element is a dot product of a row and column — this IS what a neural network layer does (multiply inputs by weight matrix). Eigenvalues/eigenvectors: directions that don't change under a transformation, just scale — this IS PCA (principal components are eigenvectors of the covariance matrix). Calculus: A derivative measures rate of change — 'if I nudge this input, how much does the output change?' Partial derivatives: same thing but for one variable at a time while holding others fixed. The gradient is a vector of all partial derivatives — it points in the direction of steepest increase. Chain rule: if y = f(g(x)), then dy/dx = f'(g(x)) × g'(x). Neural networks are nested functions, so backpropagation IS the chain rule applied through layers.",
why:"Gradient descent IS calculus (following the negative gradient). Embeddings ARE vectors (768-dimensional points). PCA IS eigenvalues. Attention IS dot products. You can't understand ML without this.",
hot:"You won't prove theorems. You WILL be asked: 'What is a gradient?' (vector of partial derivatives, points toward steepest increase of loss). 'Why dot product in attention?' (measures similarity). 'Chain rule in backprop?' (how gradients flow through layers).",
guide:"Needed for: Guide 2.4 (Loss), 2.8 (GD), 4.5 (Attention), 2.14 (PCA)",prereqs:[],
videos:[{t:"Essence of Linear Algebra (full series)",c:"3Blue1Brown",u:"https://www.youtube.com/results?search_query=3blue1brown+essence+of+linear+algebra"},{t:"Essence of Calculus",c:"3Blue1Brown",u:"https://www.youtube.com/results?search_query=3blue1brown+essence+of+calculus"},{t:"The Chain Rule",c:"3Blue1Brown",u:"https://www.youtube.com/results?search_query=3blue1brown+chain+rule"}],
code:"import numpy as np\n\n# Dot product — this IS attention\na = np.array([1, 2, 3])\nb = np.array([4, 5, 6])\nprint('Dot product:', np.dot(a, b))  # 32\n\n# Matrix multiplication — this IS a neural network layer\nW = np.array([[1,2],[3,4],[5,6]])  # 3x2 weight matrix\nx = np.array([0.5, 0.8])  # 2 inputs\nprint('Layer output:', W @ x)  # 3 outputs\n\n# Gradient: for f(x) = x^2, gradient = 2x\nx = 3.0\nprint('Gradient at x=3:', 2*x)  # 6",
draw:"Draw two vectors as arrows from origin. Show dot product as 'how much they point together.' Draw a matrix multiplying a vector — inputs on left, outputs on right, weights as connections between them. Draw the chain rule: f(g(x)) with gradient flowing backward.",
quiz:{q:"What is a gradient and why does it matter for ML?",a:"A gradient is a vector of partial derivatives — one per parameter. It points in the direction of steepest INCREASE of the function. In ML, we compute the gradient of the loss with respect to each weight, then step in the OPPOSITE direction (gradient descent) to reduce the loss. The magnitude tells you how sensitive the loss is to each weight. The chain rule lets us compute gradients through many layers — this is backpropagation."},
followups:[{q:"Why do we use the dot product in attention?",a:"The dot product measures similarity between two vectors — higher when they point the same direction. In attention, dot(Query, Key) measures 'how relevant is this key to my query?' High dot product = high relevance = high attention weight. It's computationally efficient (just element-wise multiply and sum) and differentiable."},{q:"What's the chain rule and why is it critical for neural networks?",a:"If y = f(g(x)), then dy/dx = f'(g(x)) × g'(x). Neural nets are deeply nested: output = f₄(f₃(f₂(f₁(x)))). To find how the loss changes with respect to weights in layer 1, you multiply gradients through all subsequent layers. This IS backpropagation. If any of those multiplied gradients are < 1 (sigmoid), they shrink exponentially → vanishing gradients. If > 1, they explode."}],
actions:["Watch 3Blue1Brown's Essence of Linear Algebra chapters 1-4","Compute dot products by hand for 3 vector pairs","Compute the derivative of f(x) = (2x+1)² using the chain rule by hand"]},

{id:"desc_stats",lv:0,cat:"foundation",name:"Descriptive statistics",desc:"Mean, median, mode, variance, std dev, percentiles, skewness, kurtosis",
w:"Mean (average): sum all values, divide by count. Sensitive to outliers — one billionaire in a room makes the average net worth $1B. Median: middle value when sorted. For even counts, average the two middle values. Robust to outliers — if you have [1, 2, 3, 100], median is 2.5, mean is 26.5. When data is skewed, use median. Mode: most frequent value. Mostly useful for categorical data. Variance: average of (value - mean)² across all values. Squaring makes negatives positive and penalizes big gaps more. Standard deviation: √variance, back in original units. 'The typical student scored about 10 points from the average.' Percentiles: 'what % of data falls below this value?' 25th = Q1, 50th = Q2 (median), 75th = Q3. IQR = Q3 - Q1. Outliers: anything below Q1 - 1.5×IQR or above Q3 + 1.5×IQR. Skewness: right-skewed (long right tail, mean > median, like income). Left-skewed (long left tail, mean < median). Zero = symmetric. Kurtosis: how 'pointy' the distribution is and how heavy the tails are. High kurtosis = pointy + fat tails (more extremes). Normal distribution has kurtosis 3.",
why:"The foundation of understanding any dataset. If you can't describe data, you can't model it. Interviewers test this with 'is mean or median better here?' questions.",
hot:"When asked about skewed data, say median not mean. Know the IQR outlier rule. Know that standard deviation is variance's square root in the original units. Know 68-95-99.7 rule for normal distributions.",

{id:"sql",lv:0,cat:"foundation",name:"SQL",desc:"Execution order, joins, window functions, CTEs",
w:"Execution order: FROM → WHERE → GROUP BY → HAVING → SELECT → ORDER BY → LIMIT. This is why you can't use a column alias in WHERE (SELECT hasn't run yet) but CAN in ORDER BY. JOINs (think Venn diagrams): INNER = only matching rows from both tables. LEFT = all from left + matching from right (NULL if no match). FULL OUTER = all from both (NULLs where no match). CROSS = every combination (cartesian product). SELF JOIN = join table to itself (find employees who earn more than their manager). Window functions: RANK() OVER (PARTITION BY dept ORDER BY salary DESC) — ranks within each department without collapsing rows. DENSE_RANK: no gaps. ROW_NUMBER: always unique. LAG(col, 1): previous row's value. LEAD(col, 1): next row's value. SUM/AVG OVER (PARTITION BY ... ORDER BY ... ROWS BETWEEN ...): running aggregates. CTEs: WITH name AS (subquery) — makes complex queries readable, reusable. CASE WHEN for if-then-else logic.",
why:"Often a FULL interview round. You pull data from databases every day as an ML engineer. Window functions separate junior from senior candidates.",
hot:"Know execution order (can't use alias in WHERE). Window functions are THE differentiator — write RANK, LAG, running SUM from memory. Know all join types with Venn diagram analogies.",
guide:"Guide Part 8.1 — SQL",prereqs:[],
videos:[{t:"SQL Window Functions",c:"techTFQ",u:"https://www.youtube.com/results?search_query=sql+window+functions+tutorial+techTFQ"},{t:"SQL Joins Explained",c:"",u:"https://www.youtube.com/results?search_query=sql+joins+explained+visually+venn"}],
code:"-- Rank employees by salary within each department\nSELECT name, dept, salary,\n  RANK() OVER (PARTITION BY dept ORDER BY salary DESC) as rank\nFROM employees;\n\n-- Month-over-month revenue growth\nWITH monthly AS (\n  SELECT DATE_TRUNC('month', date) as mo, SUM(amt) as rev\n  FROM orders GROUP BY 1\n)\nSELECT mo, rev,\n  LAG(rev) OVER (ORDER BY mo) as prev,\n  ROUND((rev - LAG(rev) OVER (ORDER BY mo)) / \n        LAG(rev) OVER (ORDER BY mo) * 100, 1) as growth_pct\nFROM monthly;",
draw:"Draw Venn diagrams for INNER, LEFT, FULL OUTER joins. Draw a table showing what PARTITION BY does — groups rows WITHOUT collapsing them, unlike GROUP BY.",
quiz:{q:"Why can't you use a column alias from SELECT in the WHERE clause?",a:"SQL's execution order: FROM → WHERE → GROUP BY → HAVING → SELECT → ORDER BY. WHERE runs BEFORE SELECT, so the alias doesn't exist yet. You CAN use it in ORDER BY because ORDER BY runs AFTER SELECT. To filter on a computed column, either repeat the expression in WHERE or use a CTE/subquery."},
followups:[{q:"What's the difference between RANK(), DENSE_RANK(), and ROW_NUMBER()?",a:"RANK: ties get same rank, next rank skipped (1,1,3). DENSE_RANK: ties get same rank, no skip (1,1,2). ROW_NUMBER: always unique, arbitrary tiebreaker (1,2,3). Use ROW_NUMBER when you need exactly one result per group (e.g., most recent order per customer)."},{q:"When would you use a CTE vs a subquery?",a:"CTEs are more readable and can be referenced multiple times in the same query. Subqueries are fine for one-time use. Performance is usually identical. Recursive CTEs can handle hierarchical data (org charts, tree structures) that subqueries can't."}],
actions:["Do 10 window function problems on StrataScratch or LeetCode SQL","Write a self-join query: find employees earning more than their manager","Write a CTE-based query computing month-over-month growth"]},

{id:"probability",lv:1,cat:"foundation",name:"Probability & Bayes",desc:"Independence, conditional probability, Bayes theorem, expected value",
w:"Probability: a number between 0 (impossible) and 1 (guaranteed). P(heads) = 0.5. Independent events: one doesn't affect the other. Coin flips are independent. P(A and B) = P(A) × P(B) when independent. Mutually exclusive: can't both happen. P(A or B) = P(A) + P(B) if mutually exclusive. If NOT exclusive: P(A or B) = P(A) + P(B) - P(A and B). Conditional probability: P(A|B) = 'probability of A given B happened' = P(A and B) / P(B). Bayes' Theorem: P(A|B) = P(B|A) × P(A) / P(B). Like being a detective — start with a prior guess P(A), update with evidence P(B|A). Classic example: disease affects 1% of people, test is 95% accurate. You test positive — P(actually sick) ≈ 16%, NOT 95%! Because the disease is so rare that most positives are false alarms. Out of 10,000 people: 100 sick (95 test positive), 9,900 healthy (495 false positives). You're one of 590 positives, only 95 are actually sick. Expected value: average outcome over infinite repetitions. Lottery: E = 0.01 × $100 - $1 = $0. Law of Large Numbers: more repetitions → closer to true probability.",
why:"Bayes' theorem is asked in almost every DS interview. Understanding probability is essential for understanding model predictions, confidence, and uncertainty.",
hot:"Know the disease/test Bayes example COLD — walk through the numbers. Know that P(A|B) ≠ P(B|A). Know expected value for decision-making.",
guide:"Guide 1.2 — Probability Fundamentals",prereqs:["desc_stats"],
videos:[{t:"Bayes Theorem",c:"StatQuest",u:"https://www.youtube.com/results?search_query=statquest+bayes+theorem"},{t:"Bayes theorem visually",c:"3Blue1Brown",u:"https://www.youtube.com/results?search_query=3blue1brown+bayes+theorem"}],
code:"# Bayes theorem — disease test\np_disease = 0.01\np_pos_given_disease = 0.95\np_pos_given_healthy = 0.05\np_pos = p_disease*p_pos_given_disease + (1-p_disease)*p_pos_given_healthy\np_disease_given_pos = (p_pos_given_disease * p_disease) / p_pos\nprint(f'P(sick|positive) = {p_disease_given_pos:.1%}')  # ~16%!\n\n# Expected value\nticket_cost = 1\nwin_amount = 100\nwin_prob = 0.01\nEV = win_prob * win_amount - ticket_cost\nprint(f'Expected value: ${EV:.2f}')  # $0",
draw:"Draw the Bayes disease example as a tree: 10,000 people → 100 sick / 9,900 healthy → test results at each branch. Count positives. Show why most positives are false alarms.",
quiz:{q:"A disease affects 1 in 100 people. A test is 95% accurate. You test positive. What's the probability you're actually sick?",a:"About 16%. Out of 10,000 people: 100 are sick (95 test positive = true positives), 9,900 are healthy (495 test positive = false alarms). Total positives: 590. Probability sick given positive: 95/590 ≈ 16.1%. The key insight: when the disease is rare (low prior), most positive tests are false alarms. This is why Bayes' theorem matters — your gut feeling ('95% accurate means I'm probably sick') is completely wrong."},
followups:[{q:"Is P(A|B) the same as P(B|A)?",a:"No! P(rain|clouds) ≠ P(clouds|rain). It often rains when there are clouds, but clouds can exist without rain. This confusion is called the 'prosecutor's fallacy.' P(evidence|innocent) ≠ P(innocent|evidence). Bayes' theorem converts between them."}],
actions:["Compute Bayes theorem by hand for 3 different prior probabilities (1%, 10%, 50%)","Draw the tree diagram for the disease example","Explain expected value using a real gambling example"]},

{id:"distributions",lv:1,cat:"foundation",name:"Distributions & CLT",desc:"Normal, CLT, Bernoulli, binomial, Poisson, exponential, log-normal",
w:"Normal (bell curve): symmetric, defined by mean (μ) and standard deviation (σ). 68% within 1σ, 95% within 2σ, 99.7% within 3σ. Heights, test scores, measurement errors. Central Limit Theorem (CLT): Take ANY data, even wildly non-normal. Take many random samples of 30+ items. Compute each sample's mean. Those means form a bell curve. ALWAYS. This is magic — it's why the bell curve appears everywhere in statistics. It's not because everything IS normal, it's because averages OF things are normal. Bernoulli: one coin flip (yes/no, 1/0). Parameterized by p. Binomial: multiple coin flips — 'how many heads in 100 flips?' Parameterized by n and p. Poisson: counting rare events in a time window — 'how many customers per hour?' Parameterized by λ (average rate). Key: mean = variance = λ. Uniform: everything equally likely (fair die). Flat rectangle shape. Exponential: 'how long until the next event?' Time BETWEEN events. Memoryless property — if you've waited 5 minutes, expected additional wait is the same as if you just started. Log-normal: if log(data) is normal, original data is log-normal. Income, stock prices, city populations. Always right-skewed.",
why:"Every model makes distributional assumptions. Normal → linear regression residuals. Bernoulli → logistic regression. Poisson → count data. CLT → why sample means work. Know these to understand WHY models work.",
hot:"Know CLT and explain why it matters (sample means are always normal → underpins hypothesis testing). Know Poisson for count data. Know log-normal for financial data (stock prices). Know 68-95-99.7 rule.",
guide:"Guide 1.3 — Distributions",prereqs:["desc_stats","probability"],
videos:[{t:"Normal Distribution",c:"StatQuest",u:"https://www.youtube.com/results?search_query=statquest+normal+distribution"},{t:"Central Limit Theorem",c:"StatQuest",u:"https://www.youtube.com/results?search_query=statquest+central+limit+theorem"},{t:"Poisson Distribution",c:"StatQuest",u:"https://www.youtube.com/results?search_query=statquest+poisson+distribution"}],
code:"import numpy as np\nfrom scipy import stats\nimport matplotlib.pyplot as plt\n\n# CLT: sample means of NON-normal data become normal\ndata = np.random.exponential(scale=2, size=10000)  # very skewed!\nsample_means = [np.mean(np.random.choice(data, 30)) for _ in range(1000)]\nprint(f'Original skew: {stats.skew(data):.2f}')  # ~2.0\nprint(f'Sample means skew: {stats.skew(sample_means):.2f}')  # ~0!\n\n# Poisson: count events\narrivals = np.random.poisson(lam=5, size=1000)  # avg 5 per hour\nprint(f'Mean: {arrivals.mean():.1f}, Var: {arrivals.var():.1f}')  # both ~5",
draw:"Draw the bell curve with 1σ, 2σ, 3σ boundaries marked (68%, 95%, 99.7%). Draw CLT: take a weird-shaped distribution → sample many times → histogram of sample means looks normal. Draw Poisson: bar chart showing counts (0,1,2,3,4,5...) with heights decreasing.",
quiz:{q:"What is the Central Limit Theorem and why does it matter?",a:"Take ANY distribution (skewed, bimodal, whatever). Draw many random samples of 30+ items. Compute each sample's mean. Those means will form a normal distribution — ALWAYS. This matters because most of hypothesis testing assumes normality. CLT guarantees that sample means ARE normal regardless of the underlying data, so t-tests, confidence intervals, and p-values work even when the raw data isn't normal. It's the single most important theorem in statistics."},
followups:[{q:"When would you use a Poisson distribution?",a:"For counting rare events in a fixed interval: website visits per minute, defects per unit, accidents per month. Key property: mean = variance = λ. If the variance is much larger than the mean, Poisson might not fit (overdispersion). Use negative binomial instead."},{q:"Why are stock prices log-normally distributed?",a:"Returns are approximately normal (symmetric around zero). But prices are the cumulative product of returns (1+r₁)(1+r₂)... Taking the log converts multiplication to addition, so log(price) is the sum of returns → normal by CLT. Hence prices are log-normal (always positive, right-skewed)."}],
actions:["Demonstrate CLT: generate 1000 sample means from an exponential distribution and plot the histogram","Generate Poisson random variables with different λ values and plot them","Plot a log-normal distribution and show that log(data) is normal"]},

{id:"hypothesis",lv:1,cat:"foundation",name:"Hypothesis testing",desc:"p-values, Type I/II errors, confidence intervals, statistical tests",
w:"Null hypothesis (H₀): 'nothing interesting happening.' Alternative (H₁): 'something IS happening.' p-value: probability of seeing data this extreme IF H₀ is true. p < 0.05 → reject H₀. CRITICAL TRAP: p-value is NOT 'probability H₀ is true' — it's 'probability of this data given H₀.' Type I error (false positive): reject H₀ when it's true (convict innocent person). Probability = α (0.05). Type II error (false negative): fail to reject H₀ when it's false (let guilty person go). Probability = β. Power = 1 - β: ability to detect real effects. More data = more power. Confidence intervals: '95% CI of [55%, 75%]' means if you repeated 100 times, ~95 intervals would contain the true value. NOT '95% chance true value is in this range.' Width depends on sample size (more data = narrower). Effect size: statistical significance says 'is it real?' Effect size says 'is it big enough to matter?' Cohen's d: small (0.2), medium (0.5), large (0.8). Tests: t-test (compare means of 2 groups), chi-squared (association between categorical variables), ANOVA (compare means of 3+ groups), Mann-Whitney U (non-parametric, compares medians). Bonferroni correction: if testing 20 things, use α = 0.05/20 = 0.0025 per test to prevent false discoveries. MLE: find parameter values that make observed data most likely. Minimizing MSE = MLE under Gaussian noise. Minimizing cross-entropy = MLE under Bernoulli.",
why:"Finance roles test this heavily. A/B testing IS hypothesis testing. Understanding p-values and confidence intervals is essential for any data role.",
hot:"Know p-value definition exactly (interviewers WILL test the common misconception). Know Type I vs Type II with examples. Know which test to use when. Know MLE connects statistics to ML (loss functions are negative log-likelihood).",
guide:"Guide 1.4 (MLE), 1.5 (Hypothesis Testing) — complete",prereqs:["probability","distributions"],
videos:[{t:"p-values clearly explained",c:"StatQuest",u:"https://www.youtube.com/results?search_query=statquest+p+values"},{t:"Hypothesis Testing",c:"StatQuest",u:"https://www.youtube.com/results?search_query=statquest+hypothesis+testing"},{t:"t-test",c:"StatQuest",u:"https://www.youtube.com/results?search_query=statquest+t+test"},{t:"Maximum Likelihood",c:"StatQuest",u:"https://www.youtube.com/results?search_query=statquest+maximum+likelihood"}],
code:"from scipy import stats\nimport numpy as np\n\n# t-test: are these two groups different?\ngroup_a = np.random.normal(50, 10, 100)  # mean 50\ngroup_b = np.random.normal(55, 10, 100)  # mean 55\nt_stat, p_value = stats.ttest_ind(group_a, group_b)\nprint(f't-stat: {t_stat:.2f}, p-value: {p_value:.4f}')\nprint('Significant!' if p_value < 0.05 else 'Not significant')\n\n# Cohen's d (effect size)\ndef cohens_d(g1, g2):\n    return (g1.mean() - g2.mean()) / np.sqrt((g1.std()**2 + g2.std()**2) / 2)\nprint(f\"Cohen's d: {cohens_d(group_a, group_b):.2f}\")",
draw:"Draw two overlapping bell curves (Group A and Group B). Label the area in the tail beyond the observed difference — that's the p-value. Show how more overlap = higher p-value = less significant.",
quiz:{q:"What does a p-value of 0.03 actually mean? What does it NOT mean?",a:"It means: IF the null hypothesis is true (no real difference), there's a 3% chance of seeing data this extreme or more extreme. It does NOT mean: '3% chance the null is true' or '97% chance the alternative is true.' The p-value is about the data given the hypothesis, not the hypothesis given the data. This is a conditional probability distinction that interviewers specifically test."},
followups:[{q:"When would you use a chi-squared test instead of a t-test?",a:"t-test: comparing means of continuous data between 2 groups (e.g., 'do treated patients have lower blood pressure?'). Chi-squared: testing association between two CATEGORICAL variables (e.g., 'is there a relationship between gender and product preference?'). Chi-squared compares observed frequencies to expected frequencies under independence."},{q:"What is the Bonferroni correction and when do you need it?",a:"If you run 20 hypothesis tests at α=0.05, you expect 1 false positive by pure chance (0.05 × 20 = 1). Bonferroni divides α by the number of tests: 0.05/20 = 0.0025 per test. Conservative but prevents false discoveries. Needed whenever you're testing multiple hypotheses simultaneously."}],
actions:["Run a t-test on two groups and interpret the p-value correctly","Explain Type I vs Type II errors using a spam filter example out loud","Compute a confidence interval by hand and explain what it means"]},

{id:"ab_testing",lv:1,cat:"foundation",name:"A/B testing, correlation & bias",desc:"A/B test design, Pearson/Spearman, sampling bias, Simpson's paradox, bootstrapping",
w:"A/B testing: split users randomly into control (A) and treatment (B), measure a metric, test if difference is significant. Rules: determine sample size BEFORE starting (power analysis), decide metric and threshold BEFORE looking at results, don't peek early (inflates false positives), consider practical significance (0.001% lift might be significant but useless), run long enough for weekly patterns. Correlation: Pearson r measures LINEAR relationship (-1 to +1). Zero doesn't mean no relationship — could be strong curve. Spearman: based on ranks, catches monotonic non-linear relationships, more robust to outliers. Causation requires experiments (A/B tests) — observational correlation never proves causation. Ice cream and drowning both go up in summer — but ice cream doesn't cause drowning (summer causes both). Selection bias: sample doesn't represent population. Survivorship bias: only seeing winners. Simpson's paradox: a trend in every subgroup reverses when combined (different group sizes). Bootstrapping: resample your data WITH replacement many times, compute your statistic each time → the spread gives you confidence intervals without distributional assumptions.",
why:"A/B testing is hypothesis testing in the real world — every tech company does it. Correlation vs causation is a fundamental reasoning skill. Sampling bias awareness prevents bad conclusions.",
hot:"Know A/B test rules (especially: don't peek!). Know Pearson catches only linear relationships. Know Simpson's paradox — it's a gotcha question. Know bootstrapping gives CIs without assumptions.",
guide:"Guide 1.5 (A/B Testing), 1.6 (Correlation), 1.7 (Sampling & Bias)",prereqs:["hypothesis"],
videos:[{t:"A/B Testing",c:"StatQuest",u:"https://www.youtube.com/results?search_query=statquest+a+b+testing"},{t:"Correlation vs Causation",c:"StatQuest",u:"https://www.youtube.com/results?search_query=correlation+causation+explained"},{t:"Bootstrapping",c:"StatQuest",u:"https://www.youtube.com/results?search_query=statquest+bootstrapping"}],
code:"import numpy as np\nfrom scipy import stats\n\n# A/B test simulation\nnp.random.seed(42)\ncontrol = np.random.binomial(1, 0.10, 1000)   # 10% conversion\ntreatment = np.random.binomial(1, 0.12, 1000) # 12% conversion\nchi2, p = stats.chi2_contingency([\n    [control.sum(), len(control)-control.sum()],\n    [treatment.sum(), len(treatment)-treatment.sum()]\n])[:2]\nprint(f'Control: {control.mean():.1%}, Treatment: {treatment.mean():.1%}')\nprint(f'p-value: {p:.4f}')\n\n# Bootstrapping for confidence interval\nmeans = [np.mean(np.random.choice(control, len(control), replace=True)) for _ in range(1000)]\nprint(f'95% CI: [{np.percentile(means,2.5):.3f}, {np.percentile(means,97.5):.3f}]')",
draw:"Draw an A/B test: two groups of users, different experiences, measure conversion rate. Show the statistical test determining if the difference is real or noise. Draw Simpson's paradox: show how a treatment can look worse overall but better in every subgroup.",
quiz:{q:"You run an A/B test and peek at results after 2 days. It looks significant (p=0.03). Should you stop the test?",a:"No! Peeking inflates the false positive rate. If you check 10 times during a test at α=0.05, your actual false positive rate can be 20-30%, not 5%. You must run for the predetermined duration and only evaluate at the end. If you must do early stopping, use sequential testing methods (e.g., group sequential design) that account for multiple looks."},
followups:[{q:"What is Simpson's paradox?",a:"A trend that appears in every subgroup reverses when groups are combined. Classic example: treatment A has higher success rate in both men AND women, but lower success rate overall — because more men got treatment A and men have lower baseline success. Always check for confounding variables and stratify by important groups."}],
actions:["Design an A/B test for a feature change: state hypothesis, sample size, metric, duration","Compute Pearson AND Spearman correlation on the same dataset — find a case where they differ","Implement bootstrapping from scratch and compare to scipy's CI"]},

{id:"eda",lv:2,cat:"coreml",name:"EDA & data cleaning",desc:"Explore, visualize, handle missing data, outliers",
w:"Exploratory data analysis: df.describe() for summary stats, df.info() for dtypes and nulls, df['col'].value_counts() for frequencies, df.corr() for correlation matrix. Visualize distributions with histograms, check for skewness. Missing values: df.isnull().sum() per column. Handling strategies depend on WHY data is missing: MCAR (missing completely at random) → impute with median (robust to outliers) or mean. MNAR (missing not at random, e.g., income missing for unemployed) → missingness IS informative, add a binary 'is_missing' flag column AND impute. >50% missing and not informative → consider dropping column. For tree models, XGBoost handles missing values natively. Outlier detection: IQR method (below Q1-1.5×IQR or above Q3+1.5×IQR), z-score (>3 standard deviations from mean). Always LOOK at your data before modeling — plot histograms, scatterplots, check for data entry errors.",
why:"You spend 80% of real ML work here. 'Garbage in, garbage out' is real. A model trained on dirty data with wrong labels and missing values will produce garbage predictions no matter how sophisticated the algorithm.",
hot:"Know when to drop vs impute. Know IQR outlier rule. Always say 'I'd start with EDA' when describing your ML workflow.",
guide:"Guide 2.2 (Workflow), 2.15 (Missing values section)",prereqs:["python","desc_stats"],
videos:[{t:"Exploratory Data Analysis with Pandas",c:"Corey Schafer",u:"https://www.youtube.com/results?search_query=exploratory+data+analysis+pandas+tutorial"}],
code:"import pandas as pd\nimport numpy as np\n\ndf = pd.read_csv('data.csv')\nprint(df.isnull().sum())  # nulls per column\nprint(df.describe())       # summary stats\n\n# IQR outlier detection\nQ1, Q3 = df['col'].quantile([0.25, 0.75])\nIQR = Q3 - Q1\noutliers = df[(df['col'] < Q1-1.5*IQR) | (df['col'] > Q3+1.5*IQR)]\nprint(f'{len(outliers)} outliers found')\n\n# Imputation strategies\ndf['col'].fillna(df['col'].median(), inplace=True)  # median for skewed\ndf['col_was_missing'] = df['col'].isnull().astype(int)  # flag column",
draw:"Draw a box plot with Q1, Q2, Q3, whiskers, and outlier dots labeled. Show where the 1.5×IQR cutoff falls. Draw a correlation heatmap as a colored grid.",
quiz:{q:"You have a dataset where 30% of one column is missing. How do you handle it?",a:"Depends on WHY it's missing. If random (MCAR): impute with median (robust to outliers). If systematic (income is missing for unemployed): the missingness IS informative — add a binary 'is_missing' flag column AND impute. If >50% missing and uninformative: consider dropping the column. For tree models like XGBoost, you can also just leave the NaNs — it handles them natively by learning which direction to split missing values."},
followups:[{q:"Why use median instead of mean for imputation?",a:"Mean is sensitive to outliers — a few extreme values pull it away from center. Median stays at the actual middle regardless of outliers. For right-skewed data (income, house prices), mean imputation would systematically bias the data upward."}],
actions:["Load a Kaggle dataset, check nulls, try 3 imputation strategies, compare model performance","Plot histograms of all numeric columns to check distributions","Build a correlation heatmap and identify feature pairs with |r| > 0.8"]},

{id:"feat_eng",lv:2,cat:"coreml",name:"Feature engineering & selection",desc:"Encoding, scaling, transforms, augmentation, SMOTE, feature selection",
w:"One-hot encoding: categorical → binary columns ('red' → Red:1, Blue:0, Green:0). Use for nominal categories with no order. Label encoding: categories → integers (only for ordinal: small=1, medium=2, large=3). Target encoding: category → mean of target for that category. Powerful but prone to leakage — must do within CV folds. Scaling: StandardScaler (mean=0, std=1) or MinMaxScaler (0-1). REQUIRED for KNN, SVM, neural nets (distance/gradient-based). NOT needed for trees (only care about order). Log transform: for right-skewed features, log(1+x) compresses range. Date features: extract day_of_week, month, hour, is_weekend, days_since_event. Interaction features: x₁ × x₂ captures combined effects. Polynomial: x², x³ for non-linear in linear models. Data augmentation: images (flip, rotate, crop, brightness), text (synonym replace, back-translation). SMOTE: create synthetic minority examples by interpolating between existing ones — pick two real fraud cases, create a new point halfway between them. Feature selection: Filter (correlation, mutual information — fast but ignores interactions), Wrapper (forward/backward selection — slow but thorough), Embedded (L1 zeros out features, tree-based importance — built into model).",
why:"Better features > better algorithms. This is the #1 way to improve model performance and separates average from excellent practitioners.",
hot:"Know WHEN to scale (distance/gradient methods yes, trees no). Know SMOTE mechanics. Know target encoding leakage risk. Know L1 does automatic feature selection.",
guide:"Guide 2.15 (Feature Engineering), 2.16 (Feature Selection)",prereqs:["python","desc_stats","eda"],
videos:[{t:"Feature Engineering",c:"Kaggle",u:"https://www.youtube.com/results?search_query=feature+engineering+machine+learning+tutorial"},{t:"SMOTE explained",c:"StatQuest",u:"https://www.youtube.com/results?search_query=statquest+smote"}],
code:"from sklearn.preprocessing import StandardScaler, OneHotEncoder\nimport pandas as pd, numpy as np\n\n# Scaling: fit on TRAIN only!\nscaler = StandardScaler()\nX_train_scaled = scaler.fit_transform(X_train)\nX_test_scaled = scaler.transform(X_test)  # use train's params\n\n# One-hot encoding\ndf = pd.get_dummies(df, columns=['color'], drop_first=True)\n\n# Log transform for skewed features\ndf['log_income'] = np.log1p(df['income'])\n\n# SMOTE\nfrom imblearn.over_sampling import SMOTE\nX_res, y_res = SMOTE().fit_resample(X_train, y_train)",
draw:"Draw StandardScaler before/after: feature with mean 50000 → mean 0, std 1. Draw one-hot encoding: 'red','blue','green' → three binary columns. Draw SMOTE: two minority class points, synthetic point created between them.",
quiz:{q:"Why do you need to scale features for KNN but not for Random Forest?",a:"KNN uses distance to find neighbors. If one feature is in millions and another in decimals, the large-scale feature dominates distance — the small feature is essentially ignored. Scaling puts them on equal footing. Trees only care about the ORDER of values (is X > threshold?), not magnitude — splitting 'income > 50000' gives the same result whether income is in dollars or millions of dollars."},
followups:[{q:"What's the danger of target encoding?",a:"Target encoding replaces each category with the mean target value for that category. If done on the full dataset before splitting, target information leaks into features → inflated metrics that don't generalize. Must do within each CV fold: compute means on training fold, apply to validation fold."},{q:"Forward selection vs backward elimination?",a:"Forward: start empty, add the feature that improves performance most, repeat. Good when you suspect few features matter. Backward: start with all features, remove the one that hurts performance least, repeat. Good when most features are useful. Both are computationally expensive (train many models)."}],
actions:["Scale a dataset and verify mean=0, std=1","Apply SMOTE to an imbalanced dataset and compare distributions","Use L1 (Lasso) to find which features get zeroed out — those are irrelevant"]},

{id:"class_metrics",lv:2,cat:"coreml",name:"Classification metrics",desc:"Confusion matrix, precision, recall, F1, ROC-AUC, PR-AUC, calibration",
w:"Confusion matrix: TP (said yes, was yes), TN (said no, was no), FP (said yes, was no — false alarm), FN (said no, was yes — missed it). Accuracy = (TP+TN)/total. THE TRAP: 99% accuracy is useless if 99% of data is one class. Precision = TP/(TP+FP): 'when I said yes, how often was I right?' Favor when false alarms are costly — spam filter (don't send real email to spam), criminal conviction (don't convict innocent), product recommendations (irrelevant recs erode trust). Recall = TP/(TP+FN): 'of actual positives, how many did I catch?' Favor when misses are dangerous — cancer screening (missing cancer could kill), fraud detection (missed fraud costs money), airport security (missing weapon is catastrophic). F1 = harmonic mean of precision and recall. Stays low unless BOTH are decent. F2 weights recall 2x more. F0.5 weights precision more. ROC curve: plot TPR (recall) vs FPR at every threshold. Top-left = perfect, diagonal = random. AUC = area under curve. AUC = probability a random positive ranks higher than a random negative. AUC = 1.0 perfect, 0.5 random. When AUC fails: extreme imbalance — use PR-AUC instead. Log loss: evaluates predicted probabilities, not just labels. Calibration: if model says 80% fraud, does fraud actually happen 80% of the time? Most models aren't well-calibrated. Fix with Platt scaling or isotonic regression. Brier score measures calibration + discrimination.",
why:"If you can't measure it, you can't improve it. Choosing the wrong metric = optimizing the wrong thing. This is THE most tested topic in DS interviews.",
hot:"MUST have precision vs recall examples memorized cold. Know ROC-AUC interpretation. Know when AUC fails (imbalanced → use PR-AUC). Know YOUR metrics: Precision@10=0.80, MRR@10=0.744 for Infera.",
guide:"Guide 3.1 (Classification), 3.2 (Calibration)",prereqs:["desc_stats","probability"],
videos:[{t:"Sensitivity and Specificity",c:"StatQuest",u:"https://www.youtube.com/results?search_query=statquest+sensitivity+specificity"},{t:"ROC and AUC",c:"StatQuest",u:"https://www.youtube.com/results?search_query=statquest+roc+auc"},{t:"Precision Recall",c:"StatQuest",u:"https://www.youtube.com/results?search_query=statquest+precision+recall"}],
code:"from sklearn.metrics import (confusion_matrix, precision_score,\n  recall_score, f1_score, roc_auc_score, roc_curve)\nimport matplotlib.pyplot as plt\n\ny_true = [1,1,1,0,0,0,1,0,1,0]\ny_pred = [1,0,1,0,0,1,1,0,0,0]\ny_prob = [.9,.3,.8,.1,.2,.7,.85,.15,.4,.05]\n\nprint('Confusion Matrix:\\n', confusion_matrix(y_true, y_pred))\nprint(f'Precision: {precision_score(y_true, y_pred):.2f}')\nprint(f'Recall: {recall_score(y_true, y_pred):.2f}')\nprint(f'F1: {f1_score(y_true, y_pred):.2f}')\nprint(f'AUC: {roc_auc_score(y_true, y_prob):.2f}')\n\nfpr, tpr, _ = roc_curve(y_true, y_prob)\nplt.plot(fpr, tpr); plt.plot([0,1],[0,1],'--')\nplt.xlabel('FPR'); plt.ylabel('TPR'); plt.title('ROC'); plt.show()",
draw:"Draw a 2×2 confusion matrix. Label TP, FP, FN, TN with a spam filter example. Draw an ROC curve — label axes (FPR, TPR), the diagonal (random), and the perfect point (top-left). Draw a calibration curve: predicted probability vs actual frequency, perfect = diagonal.",
quiz:{q:"You're building a cancer screening model. Precision or recall? Why?",a:"Recall. Missing actual cancer (false negative) could be fatal. You'd rather flag more suspicious cases for further testing (accept more false positives / lower precision) than miss a real cancer case. Optimize for F2 score (weights recall 2x more than precision). Use PR-AUC rather than ROC-AUC if the dataset is imbalanced (cancer is rare)."},
followups:[{q:"When is accuracy a terrible metric?",a:"Imbalanced data. If 99% of emails are not spam, predicting 'not spam' for everything gives 99% accuracy but catches zero spam. The model is useless. Use precision, recall, F1, or PR-AUC instead."},{q:"What does AUC = 0.85 mean?",a:"If you randomly pick one positive and one negative example, there's an 85% chance the model ranks the positive higher. It measures discrimination ability independent of threshold."},{q:"Explain your Infera metrics.",a:"Precision@10 = 0.80: 8 of top 10 retrieved sections are relevant. MRR@10 = 0.744: the first relevant result is typically at position 1-2. Macro F1 = 0.61: average F1 across all sentiment classes, treating each equally. ROC-AUC = 0.68: how well the model discriminates between classes across all thresholds."}],
actions:["Compute precision, recall, F1 by hand from a confusion matrix","Plot an ROC curve and compute AUC for a model you train","Train the same model, evaluate with accuracy vs F1 on imbalanced data — see the difference"]},

{id:"reg_rank_metrics",lv:2,cat:"coreml",name:"Regression, ranking & NLP metrics",desc:"MSE, RMSE, MAE, R², Precision@k, MRR, NDCG, BLEU, ROUGE, perplexity",
w:"Regression: MSE = average of (actual-predicted)², penalizes big errors heavily. RMSE = √MSE, same units as target, more interpretable. MAE = average of |actual-predicted|, less sensitive to outliers. MAPE = average of |error/actual| × 100, intuitive ('off by 15%') but undefined when actual = 0. R² = proportion of variance explained by model. R²=1 perfect, R²=0 no better than predicting the mean, can be negative (worse than mean). Adjusted R² penalizes for extra features. Ranking: Precision@k: of top k results, how many are relevant? Your Infera: P@10 = 0.80 (8/10 relevant). Recall@k: of all relevant items, how many in top k? MRR (Mean Reciprocal Rank): average of 1/rank_of_first_relevant. MRR@10 = 0.744 means first relevant typically at position 1-2. NDCG: accounts for relevance degree AND position — most relevant items should be ranked highest. Range 0-1. NLP: BLEU (machine translation): how many n-grams in machine output match the reference. Precision-oriented. ROUGE (summarization): how many n-grams in reference appear in machine output. Recall-oriented. ROUGE-1 (unigrams), ROUGE-2 (bigrams), ROUGE-L (longest common subsequence). Perplexity: how 'confused' is the language model. Lower = better. Perplexity 10 = choosing between 10 equally likely options at each step.",
why:"Different tasks need different metrics. Regression, ranking, and NLP each have their own evaluation world. Your Infera project uses ranking metrics — you MUST explain them.",
hot:"Know MSE vs MAE (outlier sensitivity). Know R² can be negative. Know YOUR ranking metrics and what they mean. Know BLEU vs ROUGE (precision vs recall oriented).",
guide:"Guide 3.3 (Regression), 3.4 (Ranking), 3.5 (NLP metrics)",prereqs:["class_metrics"],
videos:[{t:"R-squared explained",c:"StatQuest",u:"https://www.youtube.com/results?search_query=statquest+r+squared"},{t:"NDCG explained",c:"",u:"https://www.youtube.com/results?search_query=ndcg+explained+simply"}],
code:"from sklearn.metrics import mean_squared_error, mean_absolute_error, r2_score\nimport numpy as np\n\ny_true = np.array([3, 5, 2.5, 7, 4])\ny_pred = np.array([2.8, 5.5, 2.0, 6.5, 4.2])\n\nprint(f'MSE: {mean_squared_error(y_true, y_pred):.3f}')\nprint(f'RMSE: {mean_squared_error(y_true, y_pred, squared=False):.3f}')\nprint(f'MAE: {mean_absolute_error(y_true, y_pred):.3f}')\nprint(f'R²: {r2_score(y_true, y_pred):.3f}')\n\n# MRR calculation\ndef mrr(rankings):\n    return np.mean([1/r for r in rankings])\nprint(f'MRR: {mrr([1, 2, 1, 3]):.3f}')  # first relevant at positions 1,2,1,3",
draw:"Draw MSE vs MAE loss curves for a range of errors — show how MSE penalizes large errors quadratically while MAE is linear. For ranking: draw a search results list and mark relevant items — show how P@5 and MRR are computed.",
quiz:{q:"When would you use MAE instead of MSE?",a:"When you have outliers that shouldn't dominate the model's learning. MSE squares errors, so an error of 100 costs 10,000 (dominates everything). MAE treats it as 100 (proportional). If a few extreme predictions shouldn't pull the model away from doing well on typical cases, use MAE. MSE is the default when big errors are genuinely more costly."},
followups:[{q:"Can R² be negative? What does that mean?",a:"Yes. R² < 0 means the model is WORSE than just predicting the mean for every input. This usually means severe overfitting, a bug, or the completely wrong model. R²=0 means the model is no better than the mean baseline."}],
actions:["Compute MSE, RMSE, MAE, R² by hand for 5 predictions","Implement MRR from scratch","Explain what your Infera Precision@10 and MRR@10 values mean in plain English"]},

{id:"loss_fn",lv:3,cat:"coreml",name:"Loss functions",desc:"MSE, cross-entropy, MAE, Huber, focal, hinge, contrastive, triplet, loss landscape",
w:"A loss function is a scorecard that tells the model 'how wrong you are.' The model's goal: make this number as small as possible. Regression: MSE (average of (actual-predicted)², punishes big errors quadratically, default for regression, equivalent to MLE under Gaussian noise assumption), MAE (average of |actual-predicted|, linear penalty, robust to outliers), Huber (MSE for small errors, MAE for large — best of both worlds). Classification: Binary cross-entropy: -(y·log(ŷ) + (1-y)·log(1-ŷ)). When actual=1 and predicted 0.99 → loss ≈ 0.01. When actual=1 and predicted 0.01 → loss ≈ 4.6. Severely punishes confident wrong answers. Why not MSE for classification? Sigmoid + MSE creates a non-convex surface (many local minima). Cross-entropy + sigmoid is convex → gradient descent reliably finds the global minimum. Categorical cross-entropy: extension to multiple classes. Focal loss: down-weights easy examples, focuses on hard ones. For extreme imbalance (fraud detection). Hinge loss (SVM): only penalizes predictions that are wrong or not confident enough. Creates the maximum margin property. Contrastive loss: push similar pairs close, dissimilar pairs apart. Triplet loss: anchor must be closer to positive than negative by a margin. These train embedding spaces (relevant to your FinBERT embeddings). Loss landscape: convex (one valley, guaranteed to find bottom — linear/logistic regression) vs non-convex (many valleys — neural nets, but most are 'good enough'). Saddle points: flat in some directions, not true minima. More common than local minima in high dimensions. Adam handles them well.",
why:"The loss function IS the learning signal. Wrong loss = model learns wrong. Understanding MSE ↔ MLE ↔ Gaussian connects statistics to ML deeply.",
hot:"Know WHY cross-entropy not MSE for classification (convexity). Know focal loss for imbalanced data. Know contrastive/triplet for embeddings. Know MSE = MLE under Gaussian assumption.",
guide:"Guide 2.4 — Loss Functions, complete section",prereqs:["math","probability"],
videos:[{t:"Cross Entropy",c:"StatQuest",u:"https://www.youtube.com/results?search_query=statquest+cross+entropy"},{t:"Loss Functions explained",c:"StatQuest",u:"https://www.youtube.com/results?search_query=statquest+loss+functions"}],
code:"import numpy as np\n\n# MSE vs MAE with outliers\ny_true = np.array([1, 2, 3, 4, 100])\ny_pred = np.array([1.1, 2.2, 2.8, 4.1, 5])\nprint(f'MSE: {np.mean((y_true-y_pred)**2):.1f}')  # dominated by outlier\nprint(f'MAE: {np.mean(np.abs(y_true-y_pred)):.1f}')  # much less affected\n\n# Cross-entropy: see how it punishes confidence\ndef ce(y, p): return -(y*np.log(p) + (1-y)*np.log(1-p))\nprint(f'Correct & confident: {ce(1, 0.95):.3f}')  # low\nprint(f'Wrong & confident: {ce(1, 0.05):.3f}')    # HUGE\nprint(f'Wrong & unsure: {ce(1, 0.45):.3f}')        # moderate",
draw:"Draw MSE vs MAE loss curves for errors from -10 to +10. Show MSE's steep quadratic vs MAE's linear V-shape. Draw cross-entropy for y=1: x-axis = predicted probability, y-axis = loss — show how loss explodes near 0 and approaches 0 near 1.",
quiz:{q:"Why do we use cross-entropy instead of MSE for classification?",a:"With sigmoid outputs + MSE, the loss surface is non-convex — many local minima where gradient descent gets stuck. Also, MSE gradients vanish when sigmoid saturates (outputs near 0 or 1), slowing learning to a crawl. Cross-entropy + sigmoid gives a convex loss surface with a single global minimum, AND its gradient doesn't vanish at saturation. Gradient descent reliably converges. Additionally, cross-entropy corresponds to MLE under the Bernoulli distribution assumption."},
followups:[{q:"When would you use focal loss?",a:"Extreme class imbalance (e.g., 99.9% negative). Regular cross-entropy gives equal weight to all samples, so the model gets lazy predicting the majority class (easy negatives dominate the gradient). Focal loss adds a (1-p)^γ factor that down-weights easy, correctly-classified examples and focuses on the hard misclassifications."},{q:"What's the connection between MSE and MLE?",a:"Minimizing MSE is mathematically equivalent to maximizing likelihood under the assumption that errors follow a Gaussian (normal) distribution with constant variance. Minimizing cross-entropy = maximizing likelihood under Bernoulli assumption. Loss functions ARE negative log-likelihoods. This connects statistics to ML at a deep level."}],
actions:["Compute cross-entropy loss by hand for 3 predictions","Plot MSE vs MAE for a range of errors","Implement Huber loss from scratch and test with/without outliers"]},

{id:"grad_desc",lv:3,cat:"coreml",name:"Gradient descent & optimizers",desc:"SGD, momentum, AdaGrad, RMSprop, Adam, learning rate schedules",
w:"The optimization algorithm behind almost everything in ML. Analogy: blindfolded on a hilly landscape, trying to find the lowest valley. Feel the slope (gradient), take a step downhill, repeat. Math: weight = weight - learning_rate × gradient. Learning rate: too high → overshoot and diverge, too low → training takes forever. Variants: Batch GD (full dataset per update, accurate but slow), Stochastic GD (one sample per update, noisy but fast — noise helps escape local minima), Mini-batch (32-128 samples, what everyone uses). Optimizers: Momentum (remember past direction, like a rolling ball — builds speed in consistent directions, dampens oscillations), AdaGrad (per-parameter learning rate — frequent features get smaller LR, rare features keep larger — but LR monotonically shrinks, can become too small), RMSprop (fixes AdaGrad with exponential moving average instead of cumulative sum), Adam (momentum + RMSprop = direction memory + adaptive LR, the default for deep learning), AdamW (fixes Adam's weight decay bug, increasingly the actual default). Learning rate schedules: Step decay (halve LR every N epochs), Cosine annealing (smooth cosine curve high→low), Warmup (start tiny, increase gradually — prevents early instability, critical for Transformers).",
why:"This is HOW every model learns. Without understanding gradient descent, you can't debug training issues, understand learning curves, or explain why a model isn't converging.",
hot:"Know learning rate tradeoff. Know Adam = momentum + RMSprop. Know mini-batch is standard. Know warmup is critical for Transformers. Be able to explain WHY each optimizer improvement exists.",
guide:"Guide 2.8 — Gradient Descent, complete",prereqs:["math","loss_fn"],
videos:[{t:"Gradient Descent",c:"StatQuest",u:"https://www.youtube.com/results?search_query=statquest+gradient+descent"},{t:"Stochastic Gradient Descent",c:"StatQuest",u:"https://www.youtube.com/results?search_query=statquest+stochastic+gradient+descent"},{t:"Adam Optimizer",c:"StatQuest",u:"https://www.youtube.com/results?search_query=statquest+adam+optimizer"}],
code:"import numpy as np\nimport matplotlib.pyplot as plt\n\n# Watch gradient descent find y = 2x\nX = np.array([1,2,3,4,5], dtype=float)\ny = np.array([2,4,6,8,10], dtype=float)\nw, b, lr = 0.0, 0.0, 0.01\nlosses = []\nfor i in range(200):\n    pred = w*X + b\n    loss = np.mean((pred-y)**2)\n    losses.append(loss)\n    w -= lr * np.mean(2*X*(pred-y))\n    b -= lr * np.mean(2*(pred-y))\nprint(f'Learned: y = {w:.2f}x + {b:.2f}')\nplt.plot(losses); plt.ylabel('Loss'); plt.xlabel('Step'); plt.show()",
draw:"Draw the loss landscape as a bowl (2D). Show 3 paths: too high LR (bouncing over the minimum), too low LR (tiny steps), just right (smooth descent). Draw momentum: ball rolling downhill, building speed. Draw Adam: each parameter has its own adaptive step size.",
quiz:{q:"What's the difference between SGD, momentum, and Adam?",a:"SGD: basic gradient step, noisy but simple. Momentum: remembers past gradient direction (exponential moving average), smoother path, faster convergence — like a ball rolling downhill that builds speed. Adam: combines momentum (direction consistency via first moment) with RMSprop (adaptive per-parameter learning rate via second moment). Adam adapts step size for each weight individually AND uses momentum. It's the default for most deep learning because it's robust to hyperparameter choices."},
followups:[{q:"Why is learning rate warmup important for Transformers?",a:"At initialization, weights are random and gradients can be large/unstable. A high learning rate at this stage causes divergent updates. Warmup starts with a tiny LR and gradually increases over the first few thousand steps, giving the model time to stabilize before taking big steps. Then the LR decays (cosine or step). This is standard for Transformer training."},{q:"What's the difference between batch size 1, 32, and full-batch?",a:"Batch 1 (stochastic): very noisy gradients, fast updates, can escape local minima, but high variance. Full batch: accurate gradients, slow (one update per full dataset pass), uses lots of memory. Mini-batch (32-128): balanced — stable enough to converge, small enough to be fast and memory-efficient. Larger batches generally need higher learning rates."}],
actions:["Implement GD from scratch for linear regression","Try 4 learning rates (0.001, 0.01, 0.1, 1.0) and plot loss curves","Compare SGD vs Adam convergence on a simple neural network"]},

{id:"bias_var",lv:3,cat:"coreml",name:"Bias-variance tradeoff",desc:"Underfitting vs overfitting, irreducible noise, fixes for each",
w:"THE most important concept in ML. Bias: error from oversimplified assumptions. A straight line trying to fit curved data has high bias — it systematically misses the pattern. This is underfitting. Variance: error from being too sensitive to training data. A model that memorizes every data point (including noise) has high variance — it performs great on training data but terribly on new data. This is overfitting. Like a student who memorizes practice test answers but can't handle new questions. The tradeoff: total error = bias² + variance + irreducible noise. As you increase model complexity, bias goes down but variance goes up. The sweet spot minimizes total error. Irreducible noise: inherent randomness in the data (measurement error, missing features, genuinely unpredictable outcomes). No model can beat this floor. Diagnosis: bad on BOTH train and test → underfitting (high bias). Good on train but bad on test (big gap) → overfitting (high variance). Fixes for overfitting: more training data, simpler model, regularization (L1/L2), dropout, early stopping, feature selection, data augmentation. Fixes for underfitting: more complex model, better/more features, less regularization, train longer.",
why:"Every modeling decision is about navigating this tradeoff. Model selection, regularization strength, tree depth, number of epochs — all are bias-variance decisions.",
hot:"Know how to DIAGNOSE from train/test performance. Know fixes for each direction. Connect regularization to variance reduction. Say 'I'd look at the train/test gap to diagnose.'",
guide:"Guide 2.3 — Bias-Variance Tradeoff",prereqs:["math","class_metrics"],
videos:[{t:"Bias and Variance",c:"StatQuest",u:"https://www.youtube.com/results?search_query=statquest+bias+variance"}],
code:"from sklearn.preprocessing import PolynomialFeatures\nfrom sklearn.linear_model import LinearRegression\nfrom sklearn.metrics import mean_squared_error\nimport numpy as np\n\nnp.random.seed(42)\nX = np.random.uniform(-3,3,30).reshape(-1,1)\ny = X.ravel()**2 + np.random.normal(0,1,30)\n\nfor deg in [1, 2, 15]:\n    poly = PolynomialFeatures(deg)\n    Xp = poly.fit_transform(X)\n    model = LinearRegression().fit(Xp, y)\n    train_mse = mean_squared_error(y, model.predict(Xp))\n    print(f'Degree {deg}: Train MSE = {train_mse:.2f}')\n    # degree 1: high bias, degree 15: high variance, degree 2: just right",
draw:"Draw 3 curves fitting scattered dots: (1) straight line = underfitting, (2) smooth curve = just right, (3) wiggly line through every dot = overfitting. Label each with bias/variance. Draw the bias-variance tradeoff U-curve: x = complexity, y = error, with bias², variance, and total error curves.",
quiz:{q:"Your model has 95% accuracy on training data but 60% on test data. What's wrong and how do you fix it?",a:"Overfitting (high variance). The model memorized training data including noise. The 35% train-test gap is the giveaway. Fixes: more training data (harder to memorize), simpler model (fewer parameters, shallower tree), regularization (L1/L2 penalize large weights), dropout (for neural nets), early stopping (stop before overfitting), feature selection (remove noisy features), cross-validation (tune hyperparameters more robustly)."},
followups:[{q:"Your model has 55% accuracy on BOTH train and test. What's wrong?",a:"Underfitting (high bias). The model is too simple to capture the pattern. No train-test gap — just uniformly poor. Fixes: more complex model (deeper tree, more layers, polynomial features), better features (feature engineering), less regularization (reduce λ), train longer (more epochs)."},{q:"What is irreducible noise?",a:"Random variation inherent in the data — measurement noise, genuinely unpredictable outcomes (coin flips), information that's missing from the features. No model can predict better than this floor. Total error = bias² + variance + irreducible noise. You can only reduce bias and variance; irreducible noise is fixed."}],
actions:["Train polynomial regression with degrees 1, 5, 15 — plot all three on the same data","Compare train vs test error curves as model complexity increases — find the sweet spot","Overfit a decision tree (no depth limit) then fix it with max_depth and min_samples_leaf"]},

{id:"cross_val",lv:3,cat:"coreml",name:"Cross-validation & data leakage",desc:"K-fold, stratified, time series split, leakage prevention",
w:"K-Fold CV: divide data into k folds (typically 5 or 10). Train on k-1 folds, validate on remaining fold. Rotate so each fold gets a turn as validation. Average scores. More reliable than a single train/test split, especially with small datasets. Stratified K-Fold: same but preserves class distribution in each fold. Critical for imbalanced data — without it, some folds might have zero minority class examples. Leave-One-Out (LOOCV): k = n samples. Train on all but 1, test on that 1. Repeat n times. Very thorough but computationally expensive. Time Series Split: for time-ordered data, NEVER randomly split. Future data must NOT appear in training. Walk-forward: train months 1-3, test month 4. Train 1-4, test 5. Always move forward. Your stock dashboard MUST use this. Data leakage: information from outside training data sneaking in. Common sources: (1) Scaling/normalizing before splitting (scaler sees test data statistics), (2) Using future features (tomorrow's weather to predict today's sales), (3) Duplicates spanning train/test sets, (4) Target encoding without CV. Prevention: ALWAYS split first, then preprocess. Use sklearn Pipeline. Group K-Fold ensures all records from one group stay together (multiple records per patient).",
why:"Reliable evaluation prevents deploying bad models. Data leakage is the #1 reason models fail in production — inflated metrics that don't generalize.",
hot:"Know stratified k-fold for imbalanced data. Know you CANNOT randomly split time series. Know specific leakage examples (scaling before split). Mention sklearn Pipeline.",
guide:"Guide 2.2 (CV variants), 7.3 (Data Leakage)",prereqs:["class_metrics","bias_var"],
videos:[{t:"Cross Validation",c:"StatQuest",u:"https://www.youtube.com/results?search_query=statquest+cross+validation"},{t:"Data Leakage",c:"",u:"https://www.youtube.com/results?search_query=data+leakage+machine+learning+explained"}],
code:"from sklearn.model_selection import (cross_val_score, StratifiedKFold, TimeSeriesSplit)\nfrom sklearn.pipeline import Pipeline\nfrom sklearn.preprocessing import StandardScaler\nfrom sklearn.linear_model import LogisticRegression\n\n# CORRECT: Pipeline prevents leakage\npipe = Pipeline([('scaler', StandardScaler()), ('model', LogisticRegression())])\nscores = cross_val_score(pipe, X, y, cv=StratifiedKFold(5))\nprint(f'CV: {scores.mean():.3f} ± {scores.std():.3f}')\n\n# Time series: NEVER random split\nfor train_idx, test_idx in TimeSeriesSplit(5).split(X):\n    print(f'Train: {train_idx[0]}-{train_idx[-1]}, Test: {test_idx[0]}-{test_idx[-1]}')",
draw:"Draw 5-fold CV: 5 horizontal bars, each with a different segment highlighted as 'validation.' Draw walk-forward: expanding training windows, always testing on the NEXT period. Draw data leakage: show scaler fitted on ALL data (wrong) vs train only (right).",
quiz:{q:"You fit StandardScaler on your entire dataset before splitting into train/test. Why is this data leakage?",a:"The scaler computes mean and standard deviation from ALL data, including test data. When you normalize the training data, it's been adjusted using test statistics — the model indirectly 'sees' test data information. Metrics are inflated because the model has information it wouldn't have in production. Fix: fit scaler on training data ONLY, then transform both train and test with those same parameters. Use sklearn Pipeline to automate this."},
followups:[{q:"Why can't you randomly split time series data?",a:"Random splitting puts future data in training and past data in testing. The model learns from the future and 'predicts' the past — inflated metrics that don't reflect real-world performance where you always predict forward. This is exactly the look-ahead bias problem you handled in your stock dashboard by anchoring FRED features to actual availability dates."}],
actions:["Compare model performance with random split vs stratified k-fold on imbalanced data","Implement Pipeline with StandardScaler + model to prevent leakage","Do walk-forward validation on time series data and compare to random split"]},
